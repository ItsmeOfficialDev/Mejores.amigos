<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tic Tac Toe — Mejores Amigos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #FFFFFF; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

        .header { width: 100%; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #EEEEEE; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #111111; }
        .logo img { width: 32px; height: 32px; border-radius: 8px; }
        .logo span { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; }

        .game-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; width: 100%; max-width: 500px; }
        .status { margin-bottom: 32px; font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; aspect-ratio: 1/1; }
        .cell { background: #F8F9FA; border: 1px solid #EEEEEE; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 48px; font-weight: 800; font-family: 'Syne'; cursor: pointer; transition: 0.2s; }
        .cell:hover { background: #fff; border-color: #111; }
        .cell.X { color: #111111; }
        .cell.O { color: #F5B942; }

        .invite-btn { margin-top: 32px; color: #F5B942; font-weight: 700; cursor: pointer; border: none; background: none; font-size: 14px; }
    </style>
</head>
<body>
    <header class="header">
        <a href="/games.html" style="text-decoration:none; color:#666; font-size:14px; font-weight:600;"><i class="fas fa-arrow-left"></i> Back</a>
        <div class="logo"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl5O38UyupxU5PU6W5jXASsMVPWHyg6ylDIg&s"><span>Tic Tac Toe</span></div>
        <div style="width:50px;"></div>
    </header>

    <main class="game-area">
        <div class="status" id="status">Connecting...</div>
        <div class="grid" id="grid">
            <div class="cell" onclick="makeMove(0)"></div>
            <div class="cell" onclick="makeMove(1)"></div>
            <div class="cell" onclick="makeMove(2)"></div>
            <div class="cell" onclick="makeMove(3)"></div>
            <div class="cell" onclick="makeMove(4)"></div>
            <div class="cell" onclick="makeMove(5)"></div>
            <div class="cell" onclick="makeMove(6)"></div>
            <div class="cell" onclick="makeMove(7)"></div>
            <div class="cell" onclick="makeMove(8)"></div>
        </div>
        <button class="invite-btn" id="inviteBtn"><i class="fas fa-link"></i> Copy Invite Link</button>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        const socket = io('/tictactoe');
        const user = getStoredUser();
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('g') || Math.random().toString(36).substring(7);
        if(!urlParams.get('g')) window.history.replaceState({}, '', `?g=${gameId}`);

        let mySymbol = null;
        let turn = 'X';

        socket.emit('joinGame', { gameId, player: user.name });
        socket.on('gameState', (g) => {
            if (g.X === user.name) mySymbol = 'X'; else if (g.O === user.name) mySymbol = 'O'; else if (!g.O) mySymbol = 'O';
            turn = g.turn;
            const cells = document.querySelectorAll('.cell');
            g.board.forEach((v, i) => { cells[i].textContent = v; cells[i].className = 'cell ' + v; });
            document.getElementById('status').textContent = g.active ? (turn === mySymbol ? "Your Turn ("+mySymbol+")" : "Waiting for " + turn) : "Game Over";
        });
        socket.on('gameOver', (d) => { alert(d.winner === 'Draw' ? 'Draw!' : d.winner + ' Won!'); document.getElementById('status').textContent = d.winner + ' wins!'; });

        function makeMove(i) { if(turn === mySymbol) socket.emit('move', { gameId, index: i, symbol: mySymbol }); }
        document.getElementById('inviteBtn').onclick = () => { navigator.clipboard.writeText(window.location.href); alert('Link Copied!'); };
    </script>
</body>
</html>
