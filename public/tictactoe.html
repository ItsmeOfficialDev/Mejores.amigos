const user = JSON.parse(localStorage.getItem('mejoresAmigosUser')); if (!user) window.location.href = '/index.html';
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mejores Amigos — Tic Tac Toe</title>
    <style>
        body { background: #0a0a0f; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); grid-gap: 10px; margin: 20px; }
        .cell { width: 100px; height: 100px; background: #16161f; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 40px; cursor: pointer; font-family: 'Syne'; }
        .info { font-size: 18px; margin-bottom: 20px; }
        .btn-back { background: #1d1d2a; color: white; border: 1px solid rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 8px; cursor: pointer; text-decoration: none; position: absolute; top: 20px; left: 20px; }
    </style>
</head>
<body>
    <a href="/hub.html" class="btn-back">Back to Hub</a>
    <div class="info" id="status">Waiting for opponent...</div>
    <div class="board" id="board">
        <div class="cell" onclick="makeMove(0)"></div>
        <div class="cell" onclick="makeMove(1)"></div>
        <div class="cell" onclick="makeMove(2)"></div>
        <div class="cell" onclick="makeMove(3)"></div>
        <div class="cell" onclick="makeMove(4)"></div>
        <div class="cell" onclick="makeMove(5)"></div>
        <div class="cell" onclick="makeMove(6)"></div>
        <div class="cell" onclick="makeMove(7)"></div>
        <div class="cell" onclick="makeMove(8)"></div>
    </div>
    <div class="info" id="players">Player X: ... | Player O: ...</div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io('/tictactoe');
        const user = JSON.parse(localStorage.getItem('mejoresAmigosUser'));
        const gameId = 'global-ttt';
        let mySymbol = null;
        let currentBoard = Array(9).fill('');
        let currentTurn = 'X';

        socket.emit('joinTTT', { gameId, player: user.name });

        socket.on('tttState', (data) => {
            currentBoard = data.board;
            currentTurn = data.turn;
            mySymbol = data.X === user.name ? 'X' : (data.O === user.name ? 'O' : null);
            document.getElementById('players').textContent = `Player X: ${data.X || '...'} | Player O: ${data.O || '...'}`;
            updateBoard();
        });

        function makeMove(index) {
            if (currentTurn !== mySymbol || currentBoard[index] !== '') return;
            socket.emit('tttMove', { gameId, index, player: mySymbol });
        }

        socket.on('tttMoveMade', (data) => {
            currentBoard[data.index] = data.player;
            currentTurn = data.nextTurn;
            updateBoard();
        });

        function updateBoard() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, i) => {
                cell.textContent = currentBoard[i];
            });
            document.getElementById('status').textContent = currentTurn === mySymbol ? "Your turn!" : `${currentTurn}'s turn`;
        }
    </script>
</body>
</html>
