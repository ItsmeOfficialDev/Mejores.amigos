<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Games — Mejores Amigos</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { min-height: 100vh; display: flex; flex-direction: column; background: var(--bg); }
        .header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .back-link { color: var(--text-dim); text-decoration: none; font-weight: 700; font-size: 14px; }
        .back-link:hover { color: #fff; }

        .games-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 32px 24px; max-width: 1100px; margin: 0 auto; width: 100%; }
        .game-card {
            background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 32px; padding: 40px; text-align: center;
            text-decoration: none; color: inherit; transition: 0.3s var(--trans); display: flex; flex-direction: column; align-items: center; gap: 20px;
        }
        .game-card:hover { transform: translateY(-8px); border-color: var(--accent); background: #1a1a2b; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .emoji { font-size: 56px; }
        .game-card h2 { font-size: 24px; color: #fff; }

        @media (max-width: 768px) {
            .games-grid { grid-template-columns: 1fr; padding: 24px; }
            .game-card { padding: 24px; border-radius: 24px; min-height: 140px; flex-direction: row; justify-content: flex-start; gap: 24px; }
            .emoji { font-size: 32px; }
            .game-card h2 { font-size: 18px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="/hub.html" class="back-link"><i class="fas fa-arrow-left"></i> Hub</a>
        <h2 style="font-size:16px; color: #fff;">Gaming Arena</h2>
        <div style="width:40px;"></div>
    </header>

    <main class="games-grid">
        <a href="/auction/login" class="game-card animate-up" style="animation-delay: 0.1s">
            <div class="emoji">🔨</div>
            <h2>Live Auction</h2>
        </a>
        <a href="/chess.html" class="game-card animate-up" style="animation-delay: 0.2s">
            <div class="emoji">♟️</div>
            <h2>Grandmaster Chess</h2>
        </a>
        <a href="/tictactoe.html" class="game-card animate-up" style="animation-delay: 0.3s">
            <div class="emoji">❌⭕</div>
            <h2>Tic Tac Toe</h2>
        </a>
    </main>
</body>
</html>
