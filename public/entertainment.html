<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entertainment — Mejores Amigos</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: #0a0a0f; color: #fff; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

        .header { padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: rgba(10,10,15,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .back-btn { background: var(--surface); border: 1px solid var(--border); padding: 8px 16px; border-radius: 40px; text-decoration: none; color: #fff; font-weight: 700; font-size: 12px; transition: 0.2s; }
        .back-btn:hover { background: rgba(255,255,255,0.1); }

        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; }

        .stream-card {
            background: linear-gradient(135deg, #1a1a2e 0%, #12121c 100%);
            border: 1px solid var(--border); border-radius: 32px; padding: 48px 32px; text-align: center;
            max-width: 440px; width: 100%; transition: all 0.3s ease; cursor: pointer; text-decoration: none; display: block;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4); margin-bottom: 40px;
        }
        .stream-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .stream-icon { font-size: 64px; margin-bottom: 20px; }
        .stream-card h2 { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 8px; }
        .stream-card p { color: var(--text-dim); font-size: 14px; margin-bottom: 24px; font-weight: 500; }

        .premium-btn {
            display: inline-flex; align-items: center; justify-content: center;
            background: var(--accent); color: #000; padding: 14px 28px; border-radius: 100px;
            font-weight: 900; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;
            transition: 0.3s; width: 100%; border: none;
        }
        .stream-card:hover .premium-btn { transform: scale(1.05); box-shadow: 0 0 20px rgba(245, 185, 66, 0.4); }

        .featured-row { width: 100%; max-width: 1100px; }
        .row-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; margin-bottom: 20px; color: #fff; display: flex; align-items: center; gap: 10px; }
        .row-scroll { display: flex; gap: 16px; overflow-x: auto; scrollbar-width: none; padding-bottom: 12px; }
        .row-scroll::-webkit-scrollbar { display: none; }

        .poster-card { flex: 0 0 140px; aspect-ratio: 2/3; background: var(--surface); border-radius: 16px; overflow: hidden; border: 1px solid var(--border); transition: 0.3s; }
        .poster-card img { width: 100%; height: 100%; object-fit: cover; }
        .poster-card:hover { transform: scale(1.04); border-color: var(--accent); }

        @media (max-width: 768px) {
            .poster-card { flex: 0 0 120px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="flex items-center gap-2">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl5O38UyupxU5PU6W5jXASsMVPWHyg6ylDIg&s" class="logo-round" style="width:24px; height:24px;">
            <h2 style="font-size:16px;">Cinema</h2>
        </div>
        <a href="/hub.html" class="back-btn"><i class="fas fa-arrow-left"></i> HUB</a>
    </header>

    <main class="main-content">
        <a href="https://anikuro.ru/" target="_blank" class="stream-card animate-up" rel="noopener noreferrer">
            <div class="stream-icon">🎬</div>
            <h2>AniKuro TV</h2>
            <p>Your portal to infinite anime realms</p>
            <button class="premium-btn">WATCH NOW</button>
        </a>

        <div class="featured-row animate-up" style="animation-delay: 0.2s">
            <div class="row-title">✨ HIGHLIGHTS</div>
            <div class="row-scroll">
                <!-- High-res verified Jikan/MyAnimeList CDN posters -->
                <div class="poster-card"><img src="https://cdn.myanimelist.net/images/anime/1244/138851.jpg" alt="One Piece"></div>
                <div class="poster-card"><img src="https://cdn.myanimelist.net/images/anime/13/17405.jpg" alt="Naruto"></div>
                <div class="poster-card"><img src="https://cdn.myanimelist.net/images/anime/1171/109222.jpg" alt="Death Note"></div>
                <div class="poster-card"><img src="https://cdn.myanimelist.net/images/anime/10/47347.jpg" alt="Attack on Titan"></div>
                <div class="poster-card"><img src="https://cdn.myanimelist.net/images/anime/1286/117303.jpg" alt="Demon Slayer"></div>
                <div class="poster-card"><img src="https://cdn.myanimelist.net/images/anime/1108/121157.jpg" alt="Jujutsu Kaisen"></div>
            </div>
        </div>
    </main>
</body>
</html>
