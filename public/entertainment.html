<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entertainment — Mejores Amigos</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

        .header { padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: rgba(10,10,15,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .back-btn { background: var(--surface); border: 1px solid var(--border); padding: 10px 20px; border-radius: 40px; text-decoration: none; color: #fff; font-weight: 700; font-size: 13px; transition: 0.2s; }
        .back-btn:hover { background: rgba(255,255,255,0.1); }

        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }

        .stream-card {
            background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 40px; padding: 60px 48px; text-align: center;
            max-width: 500px; width: 100%; transition: all 0.3s ease; cursor: pointer; text-decoration: none; display: block;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); margin-bottom: 60px;
        }
        .stream-card:hover { transform: translateY(-8px); box-shadow: 0 20px 60px rgba(0,0,0,0.4); border-color: var(--accent); }
        .stream-icon { font-size: 80px; margin-bottom: 24px; }
        .stream-card h2 { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; color: #fff; margin-bottom: 12px; }
        .stream-card p { color: var(--text-dim); font-size: 16px; margin-bottom: 32px; }
        .stream-btn { display: inline-flex; align-items: center; gap: 12px; background: #fff; color: #000; padding: 16px 32px; border-radius: 60px; font-weight: 800; font-size: 16px; transition: 0.2s; }
        .stream-card:hover .stream-btn { background: var(--accent); gap: 16px; }

        .featured-row { width: 100%; max-width: 1200px; }
        .row-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; margin-bottom: 24px; color: #fff; display: flex; align-items: center; gap: 12px; }
        .row-scroll { display: flex; gap: 20px; overflow-x: auto; scrollbar-width: none; padding-bottom: 16px; }
        .row-scroll::-webkit-scrollbar { display: none; }
        .poster-card { flex: 0 0 160px; aspect-ratio: 2/3; background: var(--surface); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); transition: 0.3s; position: relative; }
        .poster-card img { width: 100%; height: 100%; object-fit: cover; }
        .poster-card:hover { transform: scale(1.05); border-color: var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        @media (max-width: 768px) {
            .header { padding: 16px 20px; }
            .stream-card { padding: 40px 24px; }
            .stream-icon { font-size: 60px; }
            .stream-card h2 { font-size: 26px; }
            .poster-card { flex: 0 0 130px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="flex items-center gap-3">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl5O38UyupxU5PU6W5jXASsMVPWHyg6ylDIg&s" class="logo-round" style="width:32px; height:32px;">
            <h2 style="font-size:18px; color:#fff;">Entertainment</h2>
        </div>
        <a href="/hub.html" class="back-btn"><i class="fas fa-arrow-left"></i> Hub</a>
    </header>

    <main class="main-content">
        <a href="https://anikuro.ru/" target="_blank" class="stream-card animate-up" rel="noopener noreferrer">
            <div class="stream-icon">📺</div>
            <h2>Stream Anime</h2>
            <p>Direct access to the best anime library</p>
            <div class="stream-btn">
                <span>Watch Now</span>
                <i class="fas fa-external-link-alt"></i>
            </div>
        </a>

        <div class="featured-row animate-up" style="animation-delay: 0.2s">
            <div class="row-title">🎬 Featured Picks</div>
            <div class="row-scroll">
                <div class="poster-card"><img src="https://m.media-amazon.com/images/M/MV5BODCwNWE3OTItMDc3MS00NDFjLWE1OTAtNDU3Njg4ODCkXkZfXl6XfGFkbXk@._V1_.jpg" alt="One Piece"></div>
                <div class="poster-card"><img src="https://m.media-amazon.com/images/I/918u0V4X0vL._AC_UF1000,1000_QL80_.jpg" alt="Naruto"></div>
                <div class="poster-card"><img src="https://m.media-amazon.com/images/M/MV5BMjhiMzgxZTctNDc1Ni00OTIxLTlhMTYtZTA3ZWFkODRkNmE2XkEyXkFqcGdeQXVyNjAwNDUxODI@._V1_.jpg" alt="Death Note"></div>
                <div class="poster-card"><img src="https://m.media-amazon.com/images/M/MV5BMTYyMTY2MzY0OV5BMl5BanBnXkFtZTgwNzYwMDQwNjE@._V1_.jpg" alt="Attack on Titan"></div>
                <div class="poster-card"><img src="https://m.media-amazon.com/images/M/MV5BNGY4MTg3NzgtMmFkZi00NjZjLTRkMWYtZjI1MDc2YzEzMGNkXkEyXkFqcGdeQXVyMTUzMTg2ODkz._V1_.jpg" alt="Demon Slayer"></div>
                <div class="poster-card"><img src="https://m.media-amazon.com/images/I/81p97C4-WTL._AC_UF1000,1000_QL80_.jpg" alt="Jujutsu Kaisen"></div>
            </div>
        </div>
    </main>
</body>
</html>
