<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entertainment — Mejores Amigos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #FFFFFF;
            --primary: #111111;
            --accent: #F5B942;
            --surface: #F9F9FB;
            --border: #EEEEEE;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--primary); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

        .header { padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: #fff; }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
        .logo img { width: 36px; height: 36px; border-radius: 8px; }
        .logo span { font-family: 'Syne'; font-size: 20px; font-weight: 800; }

        .main { padding: 40px 32px; flex: 1; }

        .btn-anime {
            display: flex; align-items: center; justify-content: center; gap: 20px;
            width: 100%; max-width: 400px; margin: 40px auto; background: var(--primary); color: #fff; padding: 24px; border-radius: 24px;
            text-decoration: none; font-weight: 700; font-size: 20px; transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        .btn-anime:hover { transform: translateY(-6px); box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .btn-anime .emoji { font-size: 32px; }

        .row-title { font-family: 'Syne'; font-size: 24px; font-weight: 800; margin-bottom: 24px; }
        .row-scroll { display: flex; gap: 16px; overflow-x: auto; scrollbar-width: none; padding-bottom: 24px; }
        .row-scroll::-webkit-scrollbar { display: none; }
        .poster { flex: 0 0 160px; aspect-ratio: 2/3; background: var(--surface); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; transition: 0.3s; }
        .poster img { width: 100%; height: 100%; object-fit: cover; }
        .poster:hover { transform: scale(1.05); border-color: var(--accent); }

        .back-link { display: block; text-align: center; margin-top: 40px; color: #666; font-weight: 600; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <header class="header">
        <a href="/hub.html" class="logo">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl5O38UyupxU5PU6W5jXASsMVPWHyg6ylDIg&s">
            <span>Entertainment</span>
        </a>
    </header>

    <main class="main">
        <div class="row-title">🎬 Featured Recommendations</div>
        <div class="row-scroll">
            <div class="poster"><img src="https://m.media-amazon.com/images/M/MV5BODCwNWE3OTItMDc3MS00NDFjLWE1OTAtNDU3Njg4ODCkXkZfXl6XfGFkbXk@._V1_.jpg"></div>
            <div class="poster"><img src="https://m.media-amazon.com/images/I/918u0V4X0vL._AC_UF1000,1000_QL80_.jpg"></div>
            <div class="poster"><img src="https://m.media-amazon.com/images/M/MV5BMjhiMzgxZTctNDc1Ni00OTIxLTlhMTYtZTA3ZWFkODRkNmE2XkEyXkFqcGdeQXVyNjAwNDUxODI@._V1_.jpg"></div>
            <div class="poster"><img src="https://m.media-amazon.com/images/M/MV5BMTYyMTY2MzY0OV5BMl5BanBnXkFtZTgwNzYwMDQwNjE@._V1_.jpg"></div>
            <div class="poster"><img src="https://m.media-amazon.com/images/M/MV5BNGY4MTg3NzgtMmFkZi00NjZjLTRkMWYtZjI1MDc2YzEzMGNkXkEyXkFqcGdeQXVyMTUzMTg2ODkz._V1_.jpg"></div>
        </div>

        <a href="https://anikuro.ru/" class="btn-anime" target="_blank">
            <span class="emoji">📺</span>
            <span>Stream Anime</span>
            <i class="fas fa-external-link-alt" style="font-size: 14px; opacity: 0.5;"></i>
        </a>

        <a href="/hub.html" class="back-link">
            <i class="fas fa-arrow-left" style="margin-right: 8px;"></i>
            Back to Hub
        </a>
    </main>
</body>
</html>
