<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby - Mejores Amigos</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="lobby-page">
    <div class="container">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl5O27UyupxU5PU6W5jXASsMVPWHyg6ylDIg&s" alt="Logo" class="logo small">
        <h2>AUCTION LOBBY</h2>
        <div class="lobby-content">
            <h3>PLAYERS JOINED (<span id="playerCount">0</span>/8)</h3>
            <ul id="playerList"></ul>
            <p id="statusMsg">Waiting for admin to start auction...</p>
            <div id="adminControls" style="display: none;">
                <button id="startBtn" disabled>START AUCTION</button>
                <button id="resetBtn" class="danger">RESET LOBBY</button>
            </div>
            <button id="exitBtn">EXIT LOBBY</button>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
