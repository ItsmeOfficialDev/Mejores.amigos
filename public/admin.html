<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mejores Amigos — Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-void: #0a0a0f;
            --bg-base: #0f0f18;
            --bg-surface: #16161f;
            --accent-gold: #f5b942;
            --text-primary: #f0eff8;
            --text-secondary: #9896aa;
            --border-subtle: rgba(255,255,255,0.06);
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg-void); color: var(--text-primary); margin: 0; display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background: var(--bg-base); border-right: 1px solid var(--border-subtle); padding: 20px; }
        .content { flex: 1; padding: 40px; overflow-y: auto; }
        h1 { font-family: 'Syne'; font-size: 24px; margin-bottom: 30px; }
        .nav-item { padding: 12px 15px; border-radius: 10px; cursor: pointer; color: var(--text-secondary); margin-bottom: 5px; }
        .nav-item:hover { background: var(--bg-surface); color: white; }
        .nav-item.active { background: var(--bg-surface); color: var(--accent-gold); font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid var(--border-subtle); }
        th { color: var(--text-secondary); font-size: 13px; text-transform: uppercase; }
        .btn-action { padding: 8px 12px; border-radius: 5px; border: none; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-ban { background: #f87171; color: white; }
        .btn-unban { background: #4ade80; color: #0a0a0f; }
        .btn-logout { background: #1d1d2a; color: white; border: 1px solid var(--border-subtle); }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>Admin Panel 👑</h1>
        <div class="nav-item active" onclick="showSection('users')">Users</div>
        <div class="nav-item" onclick="showSection('logs')">Logs</div>
        <div class="nav-item" onclick="showSection('anime')">Anime</div>
        <div class="nav-item" onclick="location.href='/hub.html'">Back to Hub</div>
    </div>
    <div class="content">
        <h2 id="section-title">User Management</h2>
        <div id="users-section">
            <table id="admin-table">
                <thead>
                    <tr><th>Name</th><th>Admin</th><th>Banned</th><th>Actions</th></tr>
                </thead>
                <tbody id="user-body"></tbody>
            </table>
        </div>
        <div id="logs-section" style="display:none;">
            <table id="logs-table">
                <thead>
                    <tr><th>Time</th><th>User</th><th>Action</th><th>Details</th></tr>
                </thead>
                <tbody id="log-body"></tbody>
            </table>
        </div>
        <div id="anime-section" style="display:none;">
            <table id="anime-table">
                <thead>
                    <tr><th>Title</th><th>Type</th><th>Episodes</th><th>Actions</th></tr>
                </thead>
                <tbody id="anime-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('mejoresAmigosUser'));
        if (!user || !user.isAdmin) window.location.href = '/hub.html';

        function showSection(section) {
            document.getElementById('users-section').style.display = section === 'users' ? 'block' : 'none';
            document.getElementById('logs-section').style.display = section === 'logs' ? 'block' : 'none';
            document.getElementById('anime-section').style.display = section === 'anime' ? 'block' : 'none';
            document.getElementById('section-title').textContent = section.charAt(0).toUpperCase() + section.slice(1) + ' Management';

            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            event.target.classList.add('active');

            if (section === 'users') loadUsers();
            if (section === 'logs') loadLogs();
            if (section === 'anime') loadAnime();
        }

        async function loadUsers() {
            const res = await fetch('/api/admin/users');
            const users = await res.json();
            const body = document.getElementById('user-body');
            body.innerHTML = users.map(u => `
                <tr>
                    <td>${u.name}</td>
                    <td>${u.isMainAppAdmin ? '👑' : 'No'}</td>
                    <td>${u.banned ? 'Yes' : 'No'}</td>
                    <td>
                        <button class="btn-action ${u.banned ? 'btn-unban' : 'btn-ban'}" onclick="toggleBan('${u._id}', ${u.banned})">
                            ${u.banned ? 'Unban' : 'Ban'}
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function loadLogs() {
            const res = await fetch('/api/admin/logs');
            const logs = await res.json();
            const body = document.getElementById('log-body');
            body.innerHTML = logs.map(l => `
                <tr>
                    <td>${new Date(l.timestamp).toLocaleString()}</td>
                    <td>${l.userName}</td>
                    <td>${l.action}</td>
                    <td>${JSON.stringify(l.details)}</td>
                </tr>
            `).join('');
        }

        async function loadAnime() {
            const res = await fetch('/api/anime');
            const anime = await res.json();
            const body = document.getElementById('anime-body');
            body.innerHTML = anime.map(a => `
                <tr>
                    <td>${a.title}</td>
                    <td>${a.type}</td>
                    <td>${a.jikanId}</td>
                    <td><button class="btn-action btn-logout">Refresh</button></td>
                </tr>
            `).join('');
        }

        async function toggleBan(id, isBanned) {
            await fetch(`/api/admin/users/${id}/${isBanned ? 'unban' : 'ban'}`, { method: 'POST' });
            loadUsers();
        }

        window.onload = loadUsers;
    </script>
</body>
</html>
