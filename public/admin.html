<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Platform Admin 👑</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { background: #0a0a0f; color: white; display: flex; height: 100vh; overflow: hidden; margin: 0; font-family: 'DM Sans'; }
        .sidebar { width: 280px; background: #0f0f18; border-right: 1px solid rgba(255,255,255,0.06); padding: 40px 20px; }
        .main { flex: 1; padding: 60px; overflow-y: auto; }
        .nav-link { padding: 15px 20px; border-radius: 12px; cursor: pointer; color: #9896aa; margin-bottom: 5px; transition: 0.2s; }
        .nav-link:hover { background: rgba(255,255,255,0.03); color: #fff; }
        .nav-link.active { background: var(--accent-gold); color: #000; font-weight: bold; }
        .card-stat { background: #0f0f18; border: 1px solid rgba(255,255,255,0.06); padding: 25px; border-radius: 20px; }
        .val { font-family: 'Syne'; font-size: 32px; color: var(--accent-gold); }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; background: #0f0f18; border-radius: 20px; overflow: hidden; }
        th, td { padding: 20px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .btn-kick { background: #f87171; color: #fff; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1 style="font-family:'Syne'; margin-bottom: 40px;">Admin Panel 👑</h1>
        <div class="nav-link active" onclick="switchS(event, 'dashboard')"><i class="fas fa-home"></i> Dashboard</div>
        <div class="nav-link" onclick="switchS(event, 'users')"><i class="fas fa-users"></i> User Control</div>
<div class="nav-link" onclick="syncAnime()"><i class="fas fa-sync"></i> Sync Anime</div>
        <div class="nav-link" onclick="location.href='/hub.html'"><i class="fas fa-arrow-left"></i> Exit to Hub</div>
    </div>
    <div class="main">
        <div id="dashboard" class="sec">
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                <div class="card-stat">Total Users <div class="val" id="s-users">0</div></div>
                <div class="card-stat">Anime Indexed <div class="val" id="s-anime">0</div></div>
                <div class="card-stat">Active Now <div class="val" id="s-active">0</div></div>
                <div class="card-stat">Uptime <div class="val" id="s-uptime">0h</div></div>
            </div>
        </div>
        <div id="users" class="sec" style="display:none;">
            <h2>User Management</h2>
            <table>
                <thead><tr><th>Name</th><th>Admin</th><th>IPs</th><th>Actions</th></tr></thead>
                <tbody id="u-list"></tbody>
            </table>
        </div>
    </div>
    <script>
        const user = JSON.parse(localStorage.getItem('mejoresAmigosUser'));
        if (!user || !user.isAdmin) location.href = '/hub.html';

        async function loadStats() {
            const r = await fetch('/api/admin/stats').then(x=>x.json());
            document.getElementById('s-users').textContent = r.userCount;
            document.getElementById('s-anime').textContent = r.animeCount;
            document.getElementById('s-active').textContent = r.connections;
            document.getElementById('s-uptime').textContent = Math.floor(r.uptime/3600) + 'h';
        }

        async function loadUsers() {
            const u = await fetch('/api/admin/users').then(x=>x.json());
            document.getElementById('u-list').innerHTML = u.map(i => `
                <tr>
                    <td>${i.name}</td>
                    <td>${i.isMainAppAdmin ? 'Main' : (i.isAuctionAdmin ? 'Auction' : 'None')}</td>
                    <td>${i.ips.join(', ')}</td>
                    <td><button class="btn-kick" onclick="kick('${i.name}')">Kick</button></td>
                </tr>
            `).join('');
        }

async function syncAnime() { alert('Syncing started in background...'); await fetch('/api/admin/sync-anime', {method:'POST'}); location.reload(); }
        async function kick(name) {
            await fetch('/api/admin/users/kick/' + encodeURIComponent(name), { method: 'POST' });
            loadUsers();
        }

        function switchS(e, id) {
            document.querySelectorAll('.sec').forEach(s => s.style.display='none');
            document.getElementById(id).style.display='block';
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            e.currentTarget.classList.add('active');
            if (id === 'users') loadUsers();
        }

        window.onload = loadStats;
    </script>
</body>
</html>
