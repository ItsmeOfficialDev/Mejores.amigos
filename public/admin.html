<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Mejores Amigos</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }
        .sidebar { width: 280px; border-right: 1px solid var(--border); padding: 40px 30px; display: flex; flex-direction: column; gap: 48px; background: #07070a; position: fixed; height: 100vh; }
        .main { flex: 1; margin-left: 280px; padding: 60px; overflow-y: auto; background: var(--bg); }
        h1 { font-size: 36px; margin-bottom: 40px; letter-spacing: -1px; color: #fff; }

        .nav-item { padding: 14px 20px; border-radius: 14px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; color: var(--text-dim); display: flex; align-items: center; gap: 14px; }
        .nav-item:hover { background: var(--surface); color: #fff; }
        .nav-item.active { background: var(--accent); color: #000; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 48px; }
        .stat-card { background: var(--bg-secondary); border: 1px solid var(--border); padding: 32px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .stat-lbl { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; letter-spacing: 1px; }
        .stat-val { font-size: 32px; font-weight: 800; font-family: 'Syne'; color: #fff; }

        .log-container { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 24px; padding: 32px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .log-item { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
        .log-item:last-child { border-bottom: none; }
        .log-name { font-weight: 800; color: var(--accent); }
        .log-time { font-size: 11px; color: var(--text-dim); font-family: monospace; }
        .log-action { color: #fff; font-weight: 600; }

        @media (max-width: 900px) {
            .sidebar { width: 80px; padding: 30px 10px; }
            .sidebar span, .sidebar .logo h2 { display: none; }
            .main { margin-left: 80px; padding: 30px; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo flex items-center gap-3">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl5O38UyupxU5PU6W5jXASsMVPWHyg6ylDIg&s" class="logo-round" style="width:32px; height:32px;">
            <h2 style="font-size:18px; color:#fff;">Admin</h2>
        </div>
        <nav class="flex flex-col gap-2">
            <div class="nav-item active"><i class="fas fa-terminal"></i> <span>Live Feed</span></div>
            <div class="nav-item" onclick="location.href='/hub.html'"><i class="fas fa-house"></i> <span>Hub</span></div>
        </nav>
    </aside>

    <main class="main">
        <h1>Command Center</h1>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-lbl">Unique Users</div>
                <div class="stat-val" id="total-users">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-lbl">Recent Actions</div>
                <div class="stat-val" id="total-logs">0</div>
            </div>
        </div>

        <div class="log-container">
            <h3 style="margin-bottom: 24px; font-family: 'Syne'; color: #fff;">Activity Tracking</h3>
            <div id="logs-list">
                <p style="color: var(--text-dim);">Fetching live intelligence...</p>
            </div>
        </div>
    </main>

    <script src="/js/auth.js"></script>
    <script>
        async function loadTracking() {
            const user = await checkAuth();
            if(!user || !user.isAdmin) { location.href = '/hub.html'; return; }

            try {
                const res = await fetch('/api/admin/tracking');
                const data = await res.json();

                document.getElementById('total-users').textContent = data.userCount;
                document.getElementById('total-logs').textContent = data.logs.length;

                const list = document.getElementById('logs-list');
                if(!data.logs.length) {
                    list.innerHTML = '<p style="color: var(--text-dim);">No activity recorded yet.</p>';
                    return;
                }

                list.innerHTML = data.logs.map(log => `
                    <div class="log-item">
                        <div>
                            <span class="log-name">${log.userName}</span>
                            <span class="log-action ml-3">${log.action.replace(/_/g, ' ')}</span>
                            ${log.details ? \`<br><span style="font-size:10px; color:var(--text-dim);">\${JSON.stringify(log.details)}</span>\` : ''}
                        </div>
                        <div class="log-time">\${new Date(log.timestamp).toLocaleTimeString()}</div>
                    </div>
                `).join('');

            } catch(e) {
                console.error(e);
            }
        }
        loadTracking();
        setInterval(loadTracking, 10000);
    </script>
</body>
</html>
