<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Mejores Amigos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #FFFFFF;
            --primary: #111111;
            --accent: #F5B942;
            --surface: #F9F9FB;
            --border: #EEEEEE;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--primary); min-height: 100vh; display: flex; }

        .sidebar { width: 260px; border-right: 1px solid var(--border); padding: 32px; display: flex; flex-direction: column; gap: 40px; }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
        .logo img { width: 32px; height: 32px; border-radius: 8px; }
        .logo span { font-family: 'Syne'; font-size: 18px; font-weight: 800; }

        .nav { display: flex; flex-direction: column; gap: 8px; }
        .nav-item { padding: 12px 16px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; color: #666; display: flex; align-items: center; gap: 12px; }
        .nav-item:hover { background: var(--surface); color: var(--primary); }
        .nav-item.active { background: var(--primary); color: #fff; }

        .main { flex: 1; padding: 48px; overflow-y: auto; }
        h1 { font-family: 'Syne'; font-size: 32px; margin-bottom: 32px; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 48px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); padding: 24px; border-radius: 24px; }
        .stat-lbl { font-size: 12px; font-weight: 700; text-transform: uppercase; color: #999; margin-bottom: 8px; }
        .stat-val { font-size: 24px; font-weight: 800; font-family: 'Syne'; }

        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 24px; border: 1px solid var(--border); overflow: hidden; }
        th { text-align: left; padding: 20px; background: var(--surface); font-size: 11px; text-transform: uppercase; color: #999; border-bottom: 1px solid var(--border); }
        td { padding: 20px; border-bottom: 1px solid var(--border); font-size: 14px; font-weight: 500; }

        .status-pill { padding: 4px 12px; border-radius: 100px; font-size: 11px; font-weight: 700; }
        .status-pill.active { background: #E8F5E9; color: #2E7D32; }
        .status-pill.banned { background: #FFEBEE; color: #C62828; }

        .btn-action { background: none; border: 1px solid var(--border); padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; }
        .btn-action:hover { background: var(--surface); }
    </style>
</head>
<body>
    <aside class="sidebar">
        <a href="/hub.html" class="logo">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl5O38UyupxU5PU6W5jXASsMVPWHyg6ylDIg&s">
            <span>Admin Control</span>
        </a>
        <nav class="nav">
            <div class="nav-item active"><i class="fas fa-users"></i> Users</div>
            <div class="nav-item"><i class="fas fa-chart-line"></i> Activity</div>
            <div class="nav-item"><i class="fas fa-tv"></i> Anime Status</div>
            <div class="nav-item"><i class="fas fa-server"></i> Server Stats</div>
        </nav>
    </aside>

    <main class="main">
        <h1>Dashboard</h1>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-lbl">Total Users</div><div class="stat-val" id="s-users">0</div></div>
            <div class="stat-card"><div class="stat-lbl">Active Sessions</div><div class="stat-val" id="s-sessions">0</div></div>
            <div class="stat-card"><div class="stat-lbl">Anime Titles</div><div class="stat-val" id="s-anime">0</div></div>
            <div class="stat-card"><div class="stat-lbl">Server Uptime</div><div class="stat-val" id="s-uptime">0h 0m</div></div>
        </div>

        <h3>User Management</h3>
        <br>
        <table>
            <thead>
                <tr>
                    <th>User</th>
                    <th>Join Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="user-table">
                <!-- Rows injected here -->
            </tbody>
        </table>
    </main>

    <script src="/js/auth.js"></script>
    <script>
        async function loadAdmin() {
            const user = await checkAuth();
            if(!user || !user.isAdmin) { location.href = '/hub.html'; return; }

            try {
                const res = await fetch('/api/admin/stats');
                const data = await res.json();
                document.getElementById('s-users').textContent = data.userCount;
                document.getElementById('s-sessions').textContent = data.connections;
                document.getElementById('s-anime').textContent = data.animeCount;
                const m = Math.floor(data.uptime / 60);
                document.getElementById('s-uptime').textContent = `${Math.floor(m/60)}h ${m%60}m`;

                // Mock Users List
                const table = document.getElementById('user-table');
                table.innerHTML = `
                    <tr>
                        <td>Ishan</td>
                        <td>2024-03-10</td>
                        <td><span class="status-pill active">Active</span></td>
                        <td><button class="btn-action">Ban</button></td>
                    </tr>
                    <tr>
                        <td>Sabari</td>
                        <td>2024-03-12</td>
                        <td><span class="status-pill active">Active</span></td>
                        <td><button class="btn-action">Ban</button></td>
                    </tr>
                `;
            } catch(e) {}
        }
        loadAdmin();
    </script>
</body>
</html>
