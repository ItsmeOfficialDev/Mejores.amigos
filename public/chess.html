<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chess — Mejores Amigos</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { min-height: 100vh; display: flex; flex-direction: column; background: var(--bg); }
        .header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

        .game-wrapper { flex: 1; display: flex; gap: 32px; padding: 24px; max-width: 1200px; margin: 0 auto; width: 100%; }
        #chessboard { width: 100%; max-width: 500px; aspect-ratio: 1/1; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }

        .sidebar { flex: 1; display: flex; flex-direction: column; gap: 16px; }
        .p-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 16px; display: flex; justify-content: space-between; align-items: center; }
        .p-card.active { border-color: var(--accent); background: rgba(245, 185, 66, 0.05); }
        .timer { font-family: 'Syne'; font-size: 24px; font-weight: 800; color: #fff; }
        .p-name { font-weight: 700; font-size: 14px; color: var(--text-dim); }

        .msg-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; text-align: center; font-weight: 700; font-size: 13px; color: var(--accent); }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        @media (max-width: 900px) {
            .game-wrapper { flex-direction: column; align-items: center; }
            #chessboard { max-width: 100%; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="/games" style="text-decoration:none; color:var(--text-dim); font-size:14px; font-weight:700;"><i class="fas fa-arrow-left"></i> Games</a>
        <div class="flex items-center gap-2">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl5O38UyupxU5PU6W5jXASsMVPWHyg6ylDIg&s" class="logo-round" style="width:28px; height:28px;">
            <h2 style="font-size:16px; color:#fff;">Chess</h2>
        </div>
        <button class="btn btn-outline" id="copy-link" style="padding:8px 16px; font-size:11px;"><i class="fas fa-link"></i> INVITE</button>
    </header>

    <main class="game-wrapper">
        <div id="chessboard"></div>
        <div class="sidebar">
            <div class="p-card" id="card-black">
                <span class="p-name" id="name-black">Waiting...</span>
                <div class="timer" id="time-black">10:00</div>
            </div>

            <div class="msg-box" id="status">Connecting to arena...</div>

            <div class="p-card" id="card-white">
                <span class="p-name" id="name-white">Waiting...</span>
                <div class="timer" id="time-white">10:00</div>
            </div>

            <div class="btn-row">
                <button class="btn btn-outline" onclick="socket.emit('offerDraw', {gameId})">Draw</button>
                <button class="btn btn-outline" style="color:var(--error); border-color:rgba(255,77,77,0.2);" onclick="if(confirm('Resign?')) socket.emit('resign', {gameId})">Resign</button>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/chess.js@0.13.4/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        const socket = io('/chess');
        const user = getStoredUser();
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('g') || Math.random().toString(36).substring(7);
        if (!urlParams.get('g')) window.history.replaceState({}, '', `?g=${gameId}`);

        let board = null;
        let game = new Chess();
        let myColor = null;

        function updateUI(s) {
            game.load(s.fen);
            document.getElementById('name-white').textContent = s.white || 'Waiting...';
            document.getElementById('name-black').textContent = s.black || 'Waiting...';

            if (s.white === user.name) myColor = 'w';
            else if (s.black === user.name) myColor = 'b';
            else if (!s.black) myColor = 'b';

            if (!board) {
                board = Chessboard('chessboard', {
                    draggable: true,
                    position: s.fen,
                    orientation: myColor === 'w' ? 'white' : 'black',
                    onDragStart: (src, pc) => {
                        if (!s.black) return false; // Wait for opponent
                        if (game.game_over()) return false;
                        if (pc.charAt(0) !== myColor || game.turn() !== myColor) return false;
                    },
                    onDrop: (src, tgt) => {
                        let m = game.move({ from: src, to: tgt, promotion: 'q' });
                        if (m === null) return 'snapback';
                        socket.emit('move', { gameId, move: m });
                    },
                    onSnapEnd: () => board.position(game.fen()),
                    pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
                });
            } else {
                board.position(s.fen);
            }

            const fmt = (sec) => `${Math.floor(sec/60)}:${(sec%60).toString().padStart(2,'0')}`;
            document.getElementById('time-white').textContent = fmt(s.timers.w);
            document.getElementById('time-black').textContent = fmt(s.timers.b);

            document.getElementById('card-white').classList.toggle('active', game.turn() === 'w');
            document.getElementById('card-black').classList.toggle('active', game.turn() === 'b');

            if (!s.black) document.getElementById('status').textContent = "Waiting for Challenger...";
            else document.getElementById('status').textContent = game.game_over() ? 'Arena Closed' : (game.turn() === myColor ? '🎯 YOUR TURN' : "⏳ OPPONENT'S TURN");
        }

        socket.emit('joinGame', { gameId, player: user.name });
        socket.on('gameState', updateUI);
        socket.on('moveMade', updateUI);
        socket.on('gameOver', (d) => { alert(d.result); document.getElementById('status').textContent = d.result; });
        socket.on('drawOffered', () => { if(confirm('Opponent offered draw. Accept?')) socket.emit('acceptDraw', {gameId}); });

        document.getElementById('copy-link').onclick = () => {
            navigator.clipboard.writeText(window.location.href);
            alert('Invite Link Copied!');
        };
    </script>
</body>
</html>
