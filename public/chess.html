<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chess — Mejores Amigos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #FFFFFF; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

        .header { padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #EEEEEE; background: #FFFFFF; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #111111; }
        .logo img { width: 36px; height: 36px; border-radius: 8px; }
        .logo span { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; }

        .invite-btn { background: #F8F9FA; border: 1px solid #EEEEEE; padding: 10px 20px; border-radius: 40px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .invite-btn.copied { background: #22c55e; color: white; border-color: #22c55e; }

        .game-container { flex: 1; display: flex; gap: 32px; padding: 32px; max-width: 1300px; margin: 0 auto; width: 100%; }
        #chessboard { width: 100%; max-width: 550px; aspect-ratio: 1/1; border-radius: 12px; overflow: hidden; border: 1px solid #EEEEEE; }

        .game-info { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .player-card { background: #F8F9FA; border: 1px solid #EEEEEE; border-radius: 20px; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .player-card.active { border-left: 4px solid #F5B942; background: #FFFBF5; }
        .timer { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; }
        .status { background: #F8F9FA; border: 1px solid #EEEEEE; border-radius: 16px; padding: 16px; text-align: center; font-weight: 600; font-size: 14px; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { padding: 14px; border-radius: 40px; border: none; font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .btn-secondary { background: #F8F9FA; border: 1px solid #EEEEEE; color: #111111; }
        .btn-danger { background: #fff5f5; border: 1px solid #ffe0e0; color: #ff4d4d; }

        @media (max-width: 900px) {
            .game-container { flex-direction: column; padding: 20px; gap: 20px; }
            #chessboard { max-width: 100%; }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="/games.html" style="text-decoration:none; color:#666; font-size:14px; font-weight:600;"><i class="fas fa-arrow-left"></i> Back</a>
        <div class="logo">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl5O38UyupxU5PU6W5jXASsMVPWHyg6ylDIg&s" alt="Logo">
            <span>Grandmaster Chess</span>
        </div>
        <button class="invite-btn" id="inviteBtn"><i class="fas fa-link"></i> Invite Friend</button>
    </header>

    <main class="game-container">
        <div id="chessboard"></div>
        <div class="game-info">
            <div class="player-card" id="blackCard">
                <span id="blackName">Waiting...</span>
                <div class="timer" id="blackTimer">10:00</div>
            </div>
            <div class="player-card" id="whiteCard">
                <span id="whiteName">Waiting...</span>
                <div class="timer" id="whiteTimer">10:00</div>
            </div>
            <div class="status" id="statusMsg">Connecting...</div>
            <div class="controls">
                <button class="btn btn-secondary" onclick="offerDraw()">Draw</button>
                <button class="btn btn-danger" onclick="resign()">Resign</button>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/chess.js@0.13.4/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        const socket = io('/chess');
        const user = getStoredUser();
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('g') || Math.random().toString(36).substring(7);
        if (!urlParams.get('g')) window.history.replaceState({}, '', `?g=${gameId}`);

        let board = null;
        let game = new Chess();
        let myColor = null;

        function updateUI(s) {
            game.load(s.fen);
            document.getElementById('whiteName').textContent = s.white || 'Waiting...';
            document.getElementById('blackName').textContent = s.black || 'Waiting...';

            if (s.white === user.name) myColor = 'w';
            else if (s.black === user.name) myColor = 'b';
            else if (!s.black) myColor = 'b';

            if (!board) {
                board = Chessboard('chessboard', {
                    draggable: true,
                    position: s.fen,
                    orientation: myColor === 'w' ? 'white' : 'black',
                    onDragStart: (src, pc) => {
                        if (game.game_over()) return false;
                        if ((pc.search(/^b/) !== -1 && game.turn() === 'w') || (pc.search(/^w/) !== -1 && game.turn() === 'b')) return false;
                        if (pc.charAt(0) !== myColor) return false;
                    },
                    onDrop: (src, tgt) => {
                        let m = game.move({ from: src, to: tgt, promotion: 'q' });
                        if (m === null) return 'snapback';
                        socket.emit('move', { gameId, move: m });
                    },
                    onSnapEnd: () => board.position(game.fen()),
                    pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
                });
            } else {
                board.position(s.fen);
            }

            const fmt = (sec) => `${Math.floor(sec/60)}:${(sec%60).toString().padStart(2,'0')}`;
            document.getElementById('whiteTimer').textContent = fmt(s.timers.w);
            document.getElementById('blackTimer').textContent = fmt(s.timers.b);

            document.getElementById('whiteCard').className = game.turn() === 'w' ? 'player-card active' : 'player-card';
            document.getElementById('blackCard').className = game.turn() === 'b' ? 'player-card active' : 'player-card';
            document.getElementById('statusMsg').textContent = game.game_over() ? 'Game Over' : (game.turn() === myColor ? 'Your Turn' : "Opponent's Turn");
        }

        socket.emit('joinGame', { gameId, player: user.name });
        socket.on('gameState', updateUI);
        socket.on('moveMade', updateUI);
        socket.on('gameOver', (d) => { alert(d.result); document.getElementById('statusMsg').textContent = d.result; });

        document.getElementById('inviteBtn').onclick = () => {
            navigator.clipboard.writeText(window.location.href);
            const b = document.getElementById('inviteBtn');
            b.innerHTML = '<i class="fas fa-check"></i> Copied!';
            b.className = 'invite-btn copied';
            setTimeout(() => { b.innerHTML = '<i class="fas fa-link"></i> Invite Friend'; b.className = 'invite-btn'; }, 2000);
        };

        function resign() { if(confirm('Resign?')) socket.emit('resign', {gameId}); }
        function offerDraw() { socket.emit('offerDraw', {gameId}); }
        socket.on('drawOffered', () => { if(confirm('Opponent offered draw. Accept?')) socket.emit('acceptDraw', {gameId}); });
    </script>
</body>
</html>
