<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chess — Mejores Amigos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Chessboard.js & Chess.js -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        :root {
            --bg: #FFFFFF;
            --primary: #111111;
            --accent: #F5B942;
            --surface: #F9F9FB;
            --border: #EEEEEE;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--primary); min-height: 100vh; display: flex; flex-direction: column; }

        .header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
        .logo img { width: 32px; height: 32px; border-radius: 8px; }
        .logo span { font-family: 'Syne'; font-size: 18px; font-weight: 800; }

        .game-container { flex: 1; display: flex; gap: 32px; padding: 32px; max-width: 1200px; margin: 0 auto; width: 100%; }

        #board { width: 100%; max-width: 600px; border-radius: 8px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }

        .game-info { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .player-box { background: var(--surface); padding: 20px; border-radius: 20px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .timer { font-family: 'Syne'; font-size: 24px; font-weight: 800; color: var(--primary); }
        .p-name { font-weight: 700; font-size: 16px; }

        .move-history { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 20px; overflow-y: auto; max-height: 300px; }
        .history-title { font-size: 12px; text-transform: uppercase; font-weight: 800; color: #999; margin-bottom: 12px; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { padding: 16px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .btn-main { background: var(--primary); color: #fff; }
        .btn-alt { background: var(--surface); color: var(--primary); border: 1px solid var(--border); }

        #invite-box { background: #fff8e1; border: 1px solid #ffe082; padding: 16px; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; }

        @media (max-width: 900px) {
            .game-container { flex-direction: column; padding: 16px; }
            #board { max-width: 100%; }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="/hub.html" class="logo">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl5O38UyupxU5PU6W5jXASsMVPWHyg6ylDIg&s">
            <span>Grandmaster Chess</span>
        </a>
        <div id="invite-box" onclick="copyInvite()">Click to Copy Invite Link</div>
    </header>

    <main class="game-container">
        <div id="board"></div>

        <div class="game-info">
            <div class="player-box">
                <span class="p-name" id="p-black">Black Player</span>
                <span class="timer" id="t-black">10:00</span>
            </div>

            <div class="move-history" id="history">
                <div class="history-title">Move History</div>
                <div id="moves-list" style="font-size: 14px; line-height: 2;"></div>
            </div>

            <div class="player-box">
                <span class="p-name" id="p-white">White Player</span>
                <span class="timer" id="t-white">10:00</span>
            </div>

            <div class="controls">
                <button class="btn btn-alt" onclick="offerDraw()">Draw</button>
                <button class="btn btn-alt" onclick="resign()">Resign</button>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/chess.js@0.13.4/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        const socket = io('/chess');
        const user = getStoredUser();
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('g') || Math.random().toString(36).substring(7);
        if(!urlParams.get('g')) window.history.replaceState({}, '', `?g=${gameId}`);

        let board = null;
        let game = new Chess();
        let myColor = 'w';

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if ((myColor === 'w' && piece.search(/^b/) !== -1) ||
                (myColor === 'b' && piece.search(/^w/) !== -1)) return false;
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) return false;
        }

        function onDrop (source, target) {
            let move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            socket.emit('move', { gameId, move });
            updateStatus();
        }

        function updateStatus() {
            const moves = game.history();
            document.getElementById('moves-list').textContent = moves.join(', ');
        }

        socket.emit('joinGame', { gameId, player: user.name });

        socket.on('gameState', (s) => {
            game.load(s.fen);
            if (s.white === user.name) myColor = 'w';
            else if (s.black === user.name) myColor = 'b';
            else if (!s.black) myColor = 'b'; // Join as black

            board.orientation(myColor === 'w' ? 'white' : 'black');
            board.position(s.fen);
            document.getElementById('p-white').textContent = s.white || 'Waiting...';
            document.getElementById('p-black').textContent = s.black || 'Waiting...';
            updateTimers(s.timers);
        });

        socket.on('moveMade', (data) => {
            game.move(data.move);
            board.position(data.fen);
            updateStatus();
            updateTimers(data.timers);
        });

        function updateTimers(t) {
            const fmt = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
            document.getElementById('t-white').textContent = fmt(t.w);
            document.getElementById('t-black').textContent = fmt(t.b);
        }

        function copyInvite() {
            navigator.clipboard.writeText(window.location.href);
            document.getElementById('invite-box').textContent = 'Link Copied!';
            setTimeout(() => document.getElementById('invite-box').textContent = 'Click to Copy Invite Link', 2000);
        }

        board = Chessboard('board', {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        });

        function resign() { if(confirm('Resign game?')) socket.emit('resign', {gameId}); }
        function offerDraw() { alert('Draw offered.'); }
    </script>
</body>
</html>
