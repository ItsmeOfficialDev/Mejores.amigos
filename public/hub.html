<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mejores Amigos — Community Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #ffffff;
            --primary: #111111;
            --accent: #f5b942;
            --surface: #f8f9fa;
            --text-dim: #666666;
            --border: #e9ecef;
            --shadow: 0 10px 40px rgba(0,0,0,0.06);
            --gold: #d4af37;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--primary); min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column; }

        #loading-overlay {
            position: fixed; inset: 0; background: #fff; z-index: 10000; display: flex; align-items: center; justify-content: center;
            transition: opacity 0.4s ease;
        }
        .loader-icon { width: 100px; animation: bounce 1.2s infinite ease-in-out; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .header { padding: 24px 32px; display: flex; justify-content: space-between; align-items: center; z-index: 10; border-bottom: 1px solid var(--border); background: #fff; }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
        .logo img { width: 44px; height: 44px; border-radius: 12px; }
        .logo span { font-family: 'Syne'; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }

        .user-pill { display: flex; align-items: center; gap: 12px; background: var(--surface); padding: 8px 16px; border-radius: 100px; border: 1px solid var(--border); }
        .user-pill span { font-weight: 700; font-size: 13px; letter-spacing: 0.5px; }
        .logout-icon { font-size: 16px; color: var(--text-dim); cursor: pointer; transition: 0.2s; }
        .logout-icon:hover { color: #ff4d4d; }

        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 32px 24px; }
        .grid-layout { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; width: 100%; max-width: 1200px; }

        .hub-option {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 48px 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            box-shadow: var(--shadow);
            opacity: 0;
            transform: translateY(20px);
        }

        .hub-option.show { opacity: 1; transform: translateY(0); }

        .hub-option:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }

        .icon-wrapper {
            width: 90px;
            height: 90px;
            background: var(--surface);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            color: var(--primary);
            border: 1px solid var(--border);
        }

        .hub-option:hover .icon-wrapper {
            background: var(--primary);
            color: #fff;
            transform: scale(1.1);
            border-color: transparent;
        }

        .hub-option h2 { font-family: 'Syne'; font-size: 26px; font-weight: 800; letter-spacing: -0.8px; margin-top: 10px; }

        /* Animation Overlay */
        .page-trans { position: fixed; inset: 0; background: #fff; z-index: 10001; transform: translateX(-100%); transition: transform 0.6s cubic-bezier(0.2, 1, 0.3, 1); }
        .page-trans.active { transform: translateX(0); }

        @media (max-width: 900px) {
            .grid-layout { grid-template-columns: 1fr; gap: 20px; }
            .main-content { padding: 20px; align-items: flex-start; justify-content: flex-start; }
            .hub-option { padding: 32px 24px; border-radius: 24px; flex-direction: row; justify-content: flex-start; gap: 24px; }
            .hub-option h2 { margin-top: 0; font-size: 22px; }
            .icon-wrapper { width: 64px; height: 64px; font-size: 24px; border-radius: 18px; }
            .grid-layout { height: auto; }
            body { overflow-y: auto; }
        }

        /* Netflix Row Preview */
        .preview-area { display: none; margin-top: 60px; width: 100%; max-width: 1200px; opacity: 0; transform: translateY(20px); transition: 0.8s; }
        .preview-area.show { display: block; opacity: 1; transform: translateY(0); }
        .row-title { font-family: 'Syne'; font-size: 22px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
        .row-container { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 24px; scrollbar-width: none; }
        .row-container::-webkit-scrollbar { display: none; }
        .row-item { flex: 0 0 240px; aspect-ratio: 16/9; background: var(--surface); border-radius: 16px; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .row-item:hover { transform: scale(1.05); z-index: 2; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .row-item img { width: 100%; height: 100%; object-fit: cover; }
        .row-item .overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); display: flex; align-items: flex-end; padding: 12px; }
        .row-item .title { color: #fff; font-weight: 700; font-size: 14px; }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl5O38UyupxU5PU6W5jXASsMVPWHyg6ylDIg&s" class="loader-icon">
    </div>

    <div class="page-trans" id="transition-layer"></div>

    <header class="header">
        <a href="/hub.html" class="logo">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl5O38UyupxU5PU6W5jXASsMVPWHyg6ylDIg&s">
            <span>Mejores Amigos</span>
        </a>
        <div class="user-pill">
            <span id="u-name">...</span>
            <i class="fas fa-power-off logout-icon" onclick="handleLogout()"></i>
        </div>
    </header>

    <main class="main-content">
        <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <div class="grid-layout">
                <div class="hub-option" onclick="navigate('/auction/lobby.html')">
                    <div class="icon-wrapper"><i class="fas fa-trophy"></i></div>
                    <h2>Games</h2>
                </div>
                <div class="hub-option" onclick="showEntertainment()">
                    <div class="icon-wrapper"><i class="fas fa-clapperboard"></i></div>
                    <h2>Entertainment</h2>
                </div>
                <div class="hub-option" onclick="navigate('#', 'Padippi Area')">
                    <div class="icon-wrapper"><i class="fas fa-brain"></i></div>
                    <h2>Padippi Area</h2>
                </div>
            </div>

            <!-- Entertainment Row -->
            <div class="preview-area" id="entertainment-row">
                <div class="row-title">
                    <i class="fas fa-fire" style="color: var(--accent);"></i>
                    Recommended for You
                </div>
                <div class="row-container">
                    <div class="row-item" onclick="navigate('#', 'Anime Stream')">
                        <img src="https://m.media-amazon.com/images/M/MV5BODCwNWE3OTItMDc3MS00NDFjLWE1OTAtNDU3Njg4ODCkXkZfXl6XfGFkbXk@._V1_.jpg" alt="One Piece">
                        <div class="overlay"><span class="title">One Piece</span></div>
                    </div>
                    <div class="row-item" onclick="navigate('#', 'Anime Stream')">
                        <img src="https://m.media-amazon.com/images/I/918u0V4X0vL._AC_UF1000,1000_QL80_.jpg" alt="Naruto">
                        <div class="overlay"><span class="title">Naruto Shippuden</span></div>
                    </div>
                    <div class="row-item" onclick="navigate('#', 'Anime Stream')">
                        <img src="https://m.media-amazon.com/images/M/MV5BMjhiMzgxZTctNDc1Ni00OTIxLTlhMTYtZTA3ZWFkODRkNmE2XkEyXkFqcGdeQXVyNjAwNDUxODI@._V1_.jpg" alt="Death Note">
                        <div class="overlay"><span class="title">Death Note</span></div>
                    </div>
                    <div class="row-item" onclick="navigate('#', 'Anime Stream')">
                        <img src="https://m.media-amazon.com/images/M/MV5BMTYyMTY2MzY0OV5BMl5BanBnXkFtZTgwNzYwMDQwNjE@._V1_.jpg" alt="AOT">
                        <div class="overlay"><span class="title">Attack on Titan</span></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/auth.js"></script>
    <script>
        const loader = document.getElementById('loading-overlay');
        const cards = document.querySelectorAll('.hub-option');

        async function init() {
            const user = await checkAuth();
            if (!user) {
                window.location.href = '/index.html';
                return;
            }
            document.getElementById('u-name').textContent = user.name + (user.isAdmin ? ' 👑' : '');

            // Hide loader with fade
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
                cards.forEach((card, i) => {
                    setTimeout(() => card.classList.add('show'), i * 150);
                });
            }, 400);
        }

        function showEntertainment() {
            const row = document.getElementById('entertainment-row');
            row.classList.add('show');
            row.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }

        function navigate(url, name) {
            if (url === '#') {
                alert(name + " will be available soon in a human-made update.");
                return;
            }
            const trans = document.getElementById('transition-layer');
            trans.classList.add('active');
            setTimeout(() => window.location.href = url, 600);
        }

        init();
    </script>
</body>
</html>
