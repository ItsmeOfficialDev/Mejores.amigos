<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mejores Amigos — Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #0f0f18;
            --acc-gold: #f5b942;
            --acc-indigo: #6366f1;
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --border: rgba(255, 255, 255, 0.1);
            --glass: rgba(255, 255, 255, 0.05);
            --trans: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'DM Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; min-height: 100vh; display: flex; flex-direction: column; }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 80% 20%, rgba(99, 102, 241, 0.1), transparent 50%),
                        radial-gradient(circle at 20% 80%, rgba(245, 185, 66, 0.08), transparent 50%);
            z-index: -1;
        }

        .header { padding: 30px 50px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .logo { display: flex; align-items: center; gap: 15px; text-decoration: none; color: inherit; }
        .logo img { width: 48px; height: 48px; border-radius: 14px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .logo span { font-family: 'Syne'; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }

        .user-section { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.03); padding: 10px 20px; border-radius: 16px; border: 1px solid var(--border); backdrop-filter: blur(10px); }
        .user-name { font-weight: 700; font-size: 14px; letter-spacing: 0.5px; }
        .logout-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; transition: 0.2s; font-size: 16px; }
        .logout-btn:hover { color: #f87171; transform: scale(1.1); }

        .hub-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; }
        .hub-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; width: 100%; max-width: 1200px; }

        .hub-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.6s var(--trans);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            opacity: 0;
            transform: translateY(40px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .hub-card:nth-child(1) { animation: entrance 0.8s var(--trans) 0.1s forwards; }
        .hub-card:nth-child(2) { animation: entrance 0.8s var(--trans) 0.2s forwards; }
        .hub-card:nth-child(3) { animation: entrance 0.8s var(--trans) 0.3s forwards; }

        @keyframes entrance { to { opacity: 1; transform: translateY(0); } }

        .hub-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent, rgba(255,255,255,0.03));
            opacity: 0;
            transition: 0.6s var(--trans);
        }

        .hub-card:hover {
            transform: translateY(-15px) scale(1.03);
            border-color: rgba(245, 185, 66, 0.4);
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.7);
            background: #13131d;
        }
        .hub-card:hover::before { opacity: 1; }

        .icon-box {
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.02);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            transition: 0.6s var(--trans);
            border: 1px solid var(--border);
            color: var(--acc-gold);
        }

        .hub-card:hover .icon-box {
            transform: rotate(12deg) scale(1.1);
            background: var(--acc-gold);
            color: #000;
            box-shadow: 0 15px 40px rgba(245, 185, 66, 0.3);
            border-color: transparent;
        }

        .hub-card h2 { font-family: 'Syne'; font-size: 28px; font-weight: 800; letter-spacing: -0.8px; }
        .hub-card p { font-size: 15px; color: var(--text-dim); line-height: 1.6; max-width: 200px; }

        /* Animation Overlay */
        .page-transition { position: fixed; inset: 0; background: var(--bg); z-index: 9999; transform: translateY(-100%); transition: transform 0.7s var(--trans); }
        .page-transition.active { transform: translateY(0); }

        @media (max-width: 1024px) {
            .hub-grid { gap: 20px; }
            .hub-card { padding: 40px 20px; }
        }

        @media (max-width: 768px) {
            .hub-grid { grid-template-columns: 1fr; }
            .hub-container { overflow-y: auto; align-items: flex-start; }
            .hub-card { padding: 50px 30px; margin-bottom: 20px; }
            body { overflow-y: auto; }
            .header { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="page-transition" id="transitionLayer"></div>

    <header class="header">
        <a href="/hub.html" class="logo">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl5O38UyupxU5PU6W5jXASsMVPWHyg6ylDIg&s">
            <span>Mejores Amigos</span>
        </a>
        <div class="user-section">
            <span class="user-name" id="u-name">...</span>
            <button class="logout-btn" onclick="handleLogout()" title="Logout"><i class="fas fa-power-off"></i></button>
        </div>
    </header>

    <main class="hub-container">
        <div class="hub-grid">
            <div class="hub-card" onclick="navigate('/auction/lobby.html')">
                <div class="icon-box"><i class="fas fa-trophy"></i></div>
                <h2>Games</h2>
                <p>Elite football auctions and legendary battles.</p>
            </div>
            <div class="hub-card" onclick="navigate('#', 'Entertainment')">
                <div class="icon-box"><i class="fas fa-clapperboard"></i></div>
                <h2>Entertainment</h2>
                <p>Premium streaming for the true fans.</p>
            </div>
            <div class="hub-card" onclick="navigate('#', 'Padippi Area')">
                <div class="icon-box"><i class="fas fa-brain"></i></div>
                <h2>Padippi Area</h2>
                <p>Knowledge sharing and study masterclasses.</p>
            </div>
        </div>
    </main>

    <script src="/js/auth.js"></script>
    <script>
        async function init() {
            const user = await checkAuth();
            if (!user) {
                location.href = '/index.html';
                return;
            }
            document.getElementById('u-name').textContent = user.name + (user.isAdmin ? ' 👑' : '');
        }

        function navigate(url, name) {
            if (url === '#') {
                alert(name + " is currently under heavy development. Stay tuned!");
                return;
            }
            const layer = document.getElementById('transitionLayer');
            layer.classList.add('active');
            setTimeout(() => location.href = url, 700);
        }

        init();
    </script>
</body>
</html>
