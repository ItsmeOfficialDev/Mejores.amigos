<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub — Mejores Amigos</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo-small { width: 36px; height: 36px; border-radius: 50%; }
        .header span { font-weight: 800; font-family: 'Syne'; font-size: 18px; margin-left: 10px; color: #fff; }
        .user-pill { background: var(--surface); padding: 8px 16px; border-radius: 100px; display: flex; align-items: center; gap: 12px; border: 1px solid var(--border); }
        .user-pill b { font-size: 13px; color: #fff; }

        .hub-grid { flex: 1; display: flex; width: 100%; height: 100%; }
        .hub-btn {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
            text-decoration: none; color: inherit; background: var(--bg); border-right: 1px solid var(--border);
            transition: 0.4s var(--trans); position: relative; overflow: hidden;
        }
        .hub-btn:last-child { border-right: none; }
        .hub-btn:hover { background: var(--bg-secondary); }
        .hub-btn::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: var(--accent); transform: scaleX(0); transition: 0.4s; }
        .hub-btn:hover::after { transform: scaleX(1); }
        .emoji { font-size: 56px; transition: 0.3s; }
        .hub-btn:hover .emoji { transform: scale(1.15) rotate(5deg); }
        .hub-btn h2 { font-size: 24px; color: #fff; }

        @media (max-width: 768px) {
            .hub-grid { flex-direction: column; }
            .hub-btn { border-right: none; border-bottom: 1px solid var(--border); flex-direction: row; padding: 0 40px; justify-content: flex-start; gap: 24px; min-height: 120px; }
            .emoji { font-size: 40px; }
            .hub-btn h2 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl5O38UyupxU5PU6W5jXASsMVPWHyg6ylDIg&s" class="loader-logo logo-round">
    </div>

    <header class="header">
        <div class="flex items-center">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl5O38UyupxU5PU6W5jXASsMVPWHyg6ylDIg&s" class="logo-small logo-round">
            <span>Mejores Amigos</span>
        </div>
        <div class="user-pill">
            <b id="u-name">...</b>
            <i class="fas fa-power-off text-dim cursor-pointer" onclick="handleLogout()"></i>
        </div>
    </header>

    <main class="hub-grid">
        <a href="/games" class="hub-btn">
            <div class="emoji">⚽</div>
            <h2>Games</h2>
        </a>
        <a href="/entertainment.html" class="hub-btn">
            <div class="emoji">🎬</div>
            <h2>Entertainment</h2>
        </a>
        <a href="/padippi.html" class="hub-btn">
            <div class="emoji">📚</div>
            <h2>Padippi Area</h2>
        </a>
    </main>

    <script src="/js/auth.js"></script>
    <script>
        const overlay = document.getElementById('loading-overlay');
        async function init() {
            const user = await checkAuth();
            if (!user) { location.href = '/index.html'; return; }
            document.getElementById('u-name').textContent = user.name + (user.isAdmin ? ' 👑' : '');
            setTimeout(() => {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 400);
            }, 600);
        }
        init();
    </script>
</body>
</html>
