<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mejores Amigos — Welcome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --primary: #111111; --accent: #f5b942; --surface: #f8f9fa; --border: #e9ecef; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--primary); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .auth-container { width: 100%; max-width: 380px; padding: 40px 24px; text-align: center; }
        .logo { width: 80px; height: 80px; border-radius: 20px; margin-bottom: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { font-family: 'Syne'; font-size: 32px; font-weight: 800; margin-bottom: 40px; letter-spacing: -1px; }
        input { width: 100%; background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 16px; font-size: 16px; margin-bottom: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: #fff; }
        .btn { width: 100%; background: var(--primary); color: #fff; border: none; padding: 20px; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); }
        #err { color: #ff4d4d; font-size: 14px; margin-top: 16px; display: none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl5O38UyupxU5PU6W5jXASsMVPWHyg6ylDIg&s" class="logo">
        <h1>Welcome</h1>
        <form id="login-form">
            <input type="text" id="name" placeholder="Full Name" required autocomplete="off">
            <input type="password" id="pass" placeholder="Admin Password" style="display:none;">
            <button type="submit" class="btn">CONTINUE</button>
            <div id="err"></div>
        </form>
    </div>
    <script>
        const ni = document.getElementById('name');
        const pi = document.getElementById('pass');
        ni.oninput = () => { pi.style.display = ni.value.toLowerCase() === 'admin' ? 'block' : 'none'; };
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: ni.value, password: pi.value })
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('mejoresAmigosUser', JSON.stringify(data.user));
                location.href = '/hub.html';
            } else {
                const err = document.getElementById('err');
                err.textContent = data.error;
                err.style.display = 'block';
            }
        };
    </script>
</body>
</html>
