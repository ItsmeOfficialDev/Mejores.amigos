<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mejores Amigos — Entry</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; background: var(--bg); }
        .entry-card { width: 100%; max-width: 360px; text-align: center; }
        .logo { width: 100px; height: 100px; margin: 0 auto 32px; display: block; border-radius: 50%; box-shadow: 0 0 30px rgba(245, 185, 66, 0.2); }
        h1 { font-size: 32px; margin-bottom: 8px; color: #fff; }
        p { color: var(--text-dim); margin-bottom: 40px; font-weight: 500; font-size: 14px; }
        form { display: flex; flex-direction: column; gap: 16px; }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl5O38UyupxU5PU6W5jXASsMVPWHyg6ylDIg&s" class="loader-logo logo-round">
    </div>

    <div class="entry-card animate-up">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl5O38UyupxU5PU6W5jXASsMVPWHyg6ylDIg&s" class="logo logo-round">
        <h1>Mejores Amigos</h1>
        <p>Elite Community Hub</p>

        <form id="login-form">
            <input type="text" id="name" class="input-field" placeholder="Full Name" required autocomplete="off">
            <input type="password" id="pass" class="input-field" placeholder="Admin Password" style="display:none;">
            <button type="submit" class="btn btn-accent w-full">CONTINUE</button>
        </form>
        <div id="err" style="color:var(--error); font-size:12px; margin-top:16px; display:none;"></div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        const ni = document.getElementById('name');
        const pi = document.getElementById('pass');
        const overlay = document.getElementById('loading-overlay');

        window.onload = async () => {
            const user = await checkAuth();
            if (user) { location.href = '/hub.html'; }
            else {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 500);
            }
        };

        ni.oninput = () => { pi.style.display = ni.value.toLowerCase() === 'admin' ? 'block' : 'none'; };

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: ni.value, password: pi.value })
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('mejoresAmigosUser', JSON.stringify(data.user));
                location.href = '/hub.html';
            } else {
                const err = document.getElementById('err');
                err.textContent = data.error;
                err.style.display = 'block';
            }
        };
    </script>
</body>
</html>
