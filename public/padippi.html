<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Padippi — Mejores Amigos</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; background: var(--bg); }
        .emoji { font-size: 72px; margin-bottom: 24px; animation: bounce 2s infinite; }
        h1 { font-size: 36px; margin-bottom: 12px; color: #fff; }
        p { color: var(--text-dim); font-size: 16px; max-width: 400px; line-height: 1.6; }
        .back { margin-top: 40px; }
    </style>
</head>
<body>
    <div class="emoji">📚</div>
    <h1 class="animate-up">Padippi Area</h1>
    <p class="animate-up" style="animation-delay: 0.1s">Broad features are currently under development. Please come back after a while for exciting educational resources.</p>
    <a href="/hub.html" class="btn btn-outline back animate-up" style="animation-delay: 0.2s">Return to Hub</a>
</body>
</html>
