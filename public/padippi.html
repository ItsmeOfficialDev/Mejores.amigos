<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Padippi — Mejores Amigos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #FFFFFF;
            --primary: #111111;
            --accent: #F5B942;
            --surface: #F9F9FB;
            --border: #EEEEEE;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--primary); min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .header { padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: #fff; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
        .logo img { width: 36px; height: 36px; border-radius: 8px; }
        .logo span { font-family: 'Syne'; font-size: 20px; font-weight: 800; }

        .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }

        .card {
            width: 100%; max-width: 400px; background: #fff; border: 1px solid var(--border); border-radius: 32px;
            padding: 48px 32px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.04);
            animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .emoji { font-size: 48px; margin-bottom: 24px; display: block; }
        h1 { font-family: 'Syne'; font-size: 32px; margin-bottom: 16px; }
        p { color: #666; font-weight: 500; line-height: 1.6; }

        .back-link { margin-top: 32px; display: inline-block; color: #666; font-weight: 600; text-decoration: none; font-size: 14px; }
        .back-link:hover { color: var(--primary); }
    </style>
</head>
<body>
    <header class="header">
        <a href="/hub.html" class="logo">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl5O38UyupxU5PU6W5jXASsMVPWHyg6ylDIg&s">
            <span>Padippi Area</span>
        </a>
    </header>

    <main class="main">
        <div class="card">
            <span class="emoji">🧠</span>
            <h1>Knowledge Hub</h1>
            <p>Under heavy development. Resources and study materials coming soon.</p>

            <a href="/hub.html" class="back-link">
                <i class="fas fa-arrow-left" style="margin-right: 8px;"></i>
                Return to Hub
            </a>
        </div>
    </main>
</body>
</html>
