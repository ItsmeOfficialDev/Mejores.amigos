<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Padippi Area — Mejores Amigos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #FFFFFF; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

        .header { padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #EEEEEE; background: #FFFFFF; }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: #111111; }
        .logo img { width: 40px; height: 40px; border-radius: 10px; }
        .logo span { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
        .back-btn { background: #F8F9FA; border: 1px solid #EEEEEE; padding: 10px 20px; border-radius: 40px; text-decoration: none; color: #111111; font-weight: 600; font-size: 14px; transition: 0.2s; }

        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; }
        .coming-soon-icon { font-size: 80px; margin-bottom: 24px; animation: bounce 2s infinite ease-in-out; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .main-content h2 { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; color: #111111; margin-bottom: 16px; }
        .main-content p { color: #666666; font-size: 16px; line-height: 1.6; max-width: 500px; margin-bottom: 32px; }

        .feature-preview { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px; width: 100%; max-width: 600px; }
        .feature-card { background: #F8F9FA; border: 1px solid #EEEEEE; border-radius: 20px; padding: 20px; text-align: center; }
        .feature-card i { font-size: 28px; color: #F5B942; margin-bottom: 12px; }
        .feature-card span { display: block; font-size: 13px; font-weight: 700; color: #111111; }

        @media (max-width: 768px) {
            .header { padding: 16px 20px; }
            .coming-soon-icon { font-size: 60px; }
            .main-content h2 { font-size: 24px; }
            .feature-preview { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="/hub.html" class="logo">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl5O38UyupxU5PU6W5jXASsMVPWHyg6ylDIg&s" alt="Logo">
            <span>Padippi Area</span>
        </a>
        <a href="/hub.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
    </header>

    <main class="main-content">
        <div class="coming-soon-icon">📚</div>
        <h2>Under Development</h2>
        <p>Padippi Area is being built for the community. Coming soon with study tools, pomodoro timers, and productivity features.</p>

        <div class="feature-preview">
            <div class="feature-card"><i class="fas fa-book-open"></i><span>Study Tools</span></div>
            <div class="feature-card"><i class="fas fa-stopwatch"></i><span>Pomodoro</span></div>
            <div class="feature-card"><i class="fas fa-medal"></i><span>Leaderboards</span></div>
            <div class="feature-card"><i class="fas fa-users-viewfinder"></i><span>Study Groups</span></div>
        </div>
    </main>
</body>
</html>
