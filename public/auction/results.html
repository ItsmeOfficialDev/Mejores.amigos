<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mejores Amigos — Final Results</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --primary: #111111;
            --accent: #f5b942;
            --surface: #f8f9fa;
            --text-dim: #666666;
            --border: #e9ecef;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--primary); min-height: 100vh; padding: 24px; }

        .header { text-align: center; margin-bottom: 40px; }
        h1 { font-family: 'Syne'; font-size: 32px; font-weight: 800; }

        .results-box { max-width: 600px; margin: 0 auto; background: #fff; border: 1px solid var(--border); border-radius: 24px; padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }

        .team-selector { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); font-size: 15px; font-weight: 600; margin-bottom: 24px; outline: none; }

        .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
        .stat-card { background: var(--surface); padding: 16px 8px; border-radius: 16px; text-align: center; border: 1px solid var(--border); }
        .stat-val { font-size: 16px; font-weight: 800; display: block; }
        .stat-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--text-dim); }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 11px; text-transform: uppercase; color: var(--text-dim); padding: 12px 8px; border-bottom: 1px solid var(--border); }
        td { padding: 12px 8px; border-bottom: 1px solid var(--border); font-size: 14px; }

        .pos-badge { font-weight: 800; font-size: 10px; padding: 4px 8px; border-radius: 6px; background: var(--surface); color: var(--primary); margin-right: 8px; }

        .btn-home { display: block; width: 100%; max-width: 300px; margin: 40px auto 0; background: var(--primary); color: #fff; padding: 20px; border-radius: 16px; text-decoration: none; font-weight: 700; text-align: center; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Champions</h1>
        <p style="color:var(--text-dim); font-weight:500;">Auction Final Standing</p>
    </div>

    <div class="results-box">
        <select id="userSelector" class="team-selector"></select>
        <div class="summary-grid" id="summary"></div>
        <div style="overflow-x: auto;">
            <table id="playerTable">
                <thead><tr><th>Player</th><th>Position</th><th>Price</th></tr></thead>
                <tbody id="playerBody"></tbody>
            </table>
        </div>
    </div>

    <a href="/hub.html" class="btn-home">BACK TO HUB</a>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io('/auction');
        const user = JSON.parse(localStorage.getItem('mejoresAmigosUser'));
        let players = [];
        let selected = null;

        function formatM(l) { return l < 100 ? `₹${l} Lakh` : `₹${(l/100).toFixed(2)} Crore`; }

        socket.emit('joinAuction', { name: user.name, isAdmin: user.isAuctionAdmin });

        socket.on('stateUpdate', (s) => {
            players = s.players;
            const sel = document.getElementById('userSelector');
            const cur = sel.value || user.name;
            sel.innerHTML = players.map(p => `<option value="${p.name}">${p.name}'s Squad</option>`).join('');
            sel.value = cur;
            selected = players.find(x => x.name === cur);
            render();
        });

        document.getElementById('userSelector').onchange = (e) => {
            selected = players.find(x => x.name === e.target.value);
            render();
        };

        function render() {
            if (!selected) return;
            const team = selected.team || [];
            document.getElementById('summary').innerHTML = `
                <div class="stat-card"><span class="stat-val">${formatM(selected.budget)}</span><span class="stat-lbl">Remaining</span></div>
                <div class="stat-card"><span class="stat-val">${formatM(1500 - selected.budget)}</span><span class="stat-lbl">Spent</span></div>
                <div class="stat-card"><span class="stat-val">${team.length}/18</span><span class="stat-lbl">Squad</span></div>
            `;
            document.getElementById('playerBody').innerHTML = team.map(p => `
                <tr>
                    <td><span class="pos-badge">${p.position}</span>${p.name}</td>
                    <td>${p.position}</td>
                    <td style="font-weight:700;">${formatM(p.price)}</td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
