<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lobby — Mejores Amigos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #FFFFFF; font-family: 'Inter', sans-serif; min-height: 100vh; padding: 24px; display: flex; flex-direction: column; align-items: center; }
        .lobby-card { width: 100%; max-width: 500px; background: #fff; border: 1px solid #EEEEEE; border-radius: 32px; padding: 32px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); }
        h1 { font-family: 'Syne'; font-size: 32px; margin-bottom: 8px; }
        .status-msg { color: #666; font-size: 14px; margin-bottom: 32px; }
        .p-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
        .p-item { background: #F9F9FB; border: 1px solid #EEEEEE; padding: 16px 20px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22C55E; }
        .btn { width: 100%; padding: 20px; border-radius: 18px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .btn-start { background: #111; color: #fff; display: none; }
        .btn-start:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-exit { background: #F9F9FB; color: #666; border: 1px solid #EEEEEE; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="lobby-card">
        <h1>Auction Lobby</h1>
        <div class="status-msg" id="msg">Waiting for players...</div>
        <div class="p-list" id="p-list"></div>
        <button class="btn btn-start" id="start-btn" disabled>START AUCTION</button>
        <button class="btn btn-exit" onclick="location.href='/games.html'">EXIT</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('auctionUser'));
        if(!user) location.href='/auction/login';
        const socket = io('/auction');
        socket.emit('joinAuction', { name: user.name, isAdmin: user.isAuctionAdmin });
        socket.on('stateUpdate', (s) => {
            const list = document.getElementById('p-list');
            list.innerHTML = s.players.map(p => `<div class="p-item"><span>${p.isAdmin ? '👑 ' : ''}${p.name}</span><div class="status-dot"></div></div>`).join('');
            const btn = document.getElementById('start-btn');
            if(user.isAuctionAdmin) {
                btn.style.display = 'block';
                btn.disabled = s.players.length < 4;
                document.getElementById('msg').textContent = `Ready with ${s.players.length} players`;
            } else {
                document.getElementById('msg').textContent = `${s.players.length}/8 players joined.`;
            }
            if(s.gameStatus === 'active') location.href = '/auction/index';
        });
        socket.on('error', (m) => { alert(m); location.href='/games.html'; });
        document.getElementById('start-btn').onclick = () => socket.emit('startAuction');
    </script>
</body>
</html>
