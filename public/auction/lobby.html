<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mejores Amigos | Lobby</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { min-height: 100vh; background: linear-gradient(135deg, #0b1120 0%, #1a2c3e 100%); color: #fff; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .box { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 215, 0, 0.2); padding: 50px; border-radius: 30px; width: 100%; max-width: 500px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        h1 { font-family: 'Syne'; font-size: 2.5rem; margin-bottom: 10px; background: linear-gradient(135deg, #fff, #ffd700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #status-msg { font-size: 0.9rem; color: rgba(255,255,255,0.5); margin-bottom: 30px; }
        .p-list { margin-bottom: 30px; text-align: left; max-height: 300px; overflow-y: auto; }
        .p-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,215,0,0.1); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn { width: 100%; padding: 18px; border-radius: 15px; border: none; font-family: 'Syne'; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 1.1rem; margin-top: 10px; }
        .btn-start { background: linear-gradient(135deg, #4ade80, #22c55e); color: #0a0a0f; }
        .btn-start:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-hub { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="box">
        <h1>Auction Lobby</h1>
        <div id="status-msg">Waiting for participants...</div>
        <div class="p-list" id="player-list"></div>
        <button class="btn btn-start" id="start-btn" style="display:none;" disabled>START AUCTION</button>
        <button class="btn" id="reset-btn" style="display:none; background:#f87171; color:#fff; margin-top:10px;">RESET LOBBY</button>
        <button class="btn btn-hub" onclick="location.href='/hub.html'">EXIT TO HUB</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('mejoresAmigosUser'));
        if(!user) location.href='/';

        const socket = io('/auction');
        socket.emit('joinAuction', { name: user.name, isAdmin: user.isAuctionAdmin });

        socket.on('stateUpdate', (state) => {
            const list = document.getElementById('player-list');
            list.innerHTML = state.players.map(p => `
                <div class="p-item">
                    <span>${p.isAdmin ? '👑 ' : ''}${p.name}</span>
                    <span style="color:#4ade80; font-weight:700;">Connected</span>
                </div>
            `).join('');

            const startBtn = document.getElementById('start-btn');
            if(user.isAuctionAdmin) {
                startBtn.style.display = 'block';
                startBtn.disabled = state.players.length < 4;
                document.getElementById('status-msg').textContent = `Ready to start with ${state.players.length} players`;
            } else {
                document.getElementById('status-msg').textContent = `${state.players.length}/8 players joined. Waiting for admin...`;
            }

            if(state.gameStatus === 'active') location.href = '/auction/index.html';
        });

        document.getElementById('start-btn').onclick = () => socket.emit('startAuction');
        const resetBtn = document.getElementById('reset-btn');
        if(user.isAuctionAdmin) {
            resetBtn.style.display = 'block';
            resetBtn.onclick = () => { if(confirm('RESET LOBBY? This will remove ALL players.')) socket.emit('resetLobby'); };
        }
        socket.on('lobbyReset', () => { alert('Lobby reset by admin.'); location.href='/hub.html'; });
    </script>
</body>
</html>
