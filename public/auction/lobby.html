<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Lobby — Mejores Amigos</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { background: #0a0a0f; color: white; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .lobby-box { background: #0f0f18; border: 1px solid rgba(255,255,255,0.06); padding: 50px; border-radius: 30px; width: 100%; max-width: 500px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .p-list { margin: 30px 0; display: flex; flex-direction: column; gap: 10px; }
        .p-item { background: #16161f; padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; }
        .btn-lobby { width: 100%; padding: 18px; border-radius: 15px; border: none; font-family: 'Syne'; font-weight: 800; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-start { background: #4ade80; color: #000; }
        .btn-invite { background: #f5b942; color: #000; }
        #status-msg { font-size: 14px; color: #9896aa; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="lobby-box">
        <h1 style="font-family:'Syne'; font-size:32px; margin-bottom:10px;">Auction Lobby</h1>
        <div id="status-msg">Waiting for at least 4 players...</div>
        <div class="p-list" id="player-list"></div>
        <button class="btn-lobby btn-start" id="start-btn" style="display:none;" disabled>START AUCTION</button>
        <button class="btn-lobby btn-invite" onclick="copyInvite()">GENERATE INVITE LINK</button>
        <div style="margin-top:20px;"><a href="/hub.html" style="color:#9896aa; text-decoration:none; font-size:13px;">Exit to Hub</a></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('mejoresAmigosUser'));
        if (!user) location.href = '/index.html';

        const socket = io('/auction');
        socket.emit('joinAuction', { name: user.name, isAdmin: user.isAuctionAdmin });

        socket.on('stateUpdate', (state) => {
            const list = document.getElementById('player-list');
            list.innerHTML = state.players.map(p => `
                <div class="p-item">
                    <span>${p.isAdmin ? '👑 ' : ''}${p.name}</span>
                    <span style="color:#4ade80">Connected</span>
                </div>
            `).join('');

            const startBtn = document.getElementById('start-btn');
            if (user.isAuctionAdmin) {
                startBtn.style.display = 'block';
                startBtn.disabled = state.players.length < 4; // Testing mode: 1
                document.getElementById('status-msg').textContent = `Ready to start with ${state.players.length} players`;
            }

            if (state.gameStatus === 'active') location.href = '/auction/index.html';
        });

        document.getElementById('start-btn').onclick = () => socket.emit('startAuction');

        function copyInvite() {
            const url = window.location.origin + '/auction/lobby?invite=' + Math.random().toString(36).substring(7);
            navigator.clipboard.writeText(url);
            alert('Invite link copied!');
        }
    </script>
</body>
</html>
