<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lobby — Mejores Amigos</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: var(--bg); font-family: 'Inter', sans-serif; min-height: 100vh; padding: 24px; display: flex; flex-direction: column; align-items: center; }
        .lobby-card { width: 100%; max-width: 500px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 32px; padding: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); position: relative; }
        h1 { font-family: 'Syne'; font-size: 32px; margin-bottom: 8px; color: #fff; text-align: center; }
        .status-msg { color: var(--text-dim); font-size: 14px; margin-bottom: 32px; text-align: center; font-weight: 500; }

        .p-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
        .p-item { background: var(--surface); border: 1px solid var(--border); padding: 12px 16px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .p-left { display: flex; align-items: center; gap: 12px; }
        .p-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; position: relative; }
        .p-dot { width: 10px; height: 10px; border-radius: 50%; background: #444; border: 2px solid var(--surface); position: absolute; bottom: 0; right: 0; }
        .p-dot.online { background: var(--success); }
        .p-name { font-weight: 700; color: #fff; }

        .btn-start { background: var(--accent); color: #000; width: 100%; display: none; }
        .btn-start:disabled { background: var(--surface); color: var(--text-dim); cursor: not-allowed; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="lobby-card animate-up">
        <div class="flex items-center justify-center mb-3">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl5O38UyupxU5PU6W5jXASsMVPWHyg6ylDIg&s" class="logo-round" style="width:48px; height:48px;">
        </div>
        <h1>Auction Lobby</h1>
        <div class="status-msg" id="msg">Syncing...</div>

        <div class="p-list" id="p-list"></div>

        <button class="btn btn-start" id="start-btn" disabled>START AUCTION</button>
        <button class="btn btn-outline w-full mt-2" onclick="location.href='/games'">EXIT</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('auctionUser'));
        if(!user) location.href='/auction/login';

        const socket = io('/auction');
        socket.emit('joinAuction', { name: user.name, isAdmin: user.isAuctionAdmin });

        socket.on('stateUpdate', (s) => {
            const list = document.getElementById('p-list');
            list.innerHTML = s.players.map(p => `
                <div class="p-item">
                    <div class="p-left">
                        <div class="p-avatar">
                            ${p.name.charAt(0)}
                            <div class="p-dot ${p.connected ? 'online' : ''}"></div>
                        </div>
                        <span class="p-name">${p.isAdmin ? '👑 ' : ''}${p.name}</span>
                    </div>
                </div>
            `).join('');

            const btn = document.getElementById('start-btn');
            if(user.isAuctionAdmin) {
                btn.style.display = 'inline-flex';
                btn.disabled = s.players.length < 4;
                document.getElementById('msg').textContent = `Ready to start with ${s.players.length}/8 players`;
            } else {
                document.getElementById('msg').textContent = `Waiting for admin... (${s.players.length}/8 present)`;
            }
            if(s.gameStatus === 'active') location.href = '/auction/index';
        });

        socket.on('error', (m) => { alert(m); location.href='/games'; });
    </script>
</body>
</html>
