<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mejores Amigos — Auction Lobby</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --primary: #111111;
            --accent: #f5b942;
            --surface: #f8f9fa;
            --text-dim: #666666;
            --border: #e9ecef;
            --green: #4ade80;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--primary); min-height: 100vh; display: flex; flex-direction: column; }

        .header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
        .logo img { width: 40px; height: 40px; border-radius: 10px; }
        .logo span { font-family: 'Syne'; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }

        .lobby-container { flex: 1; padding: 24px; display: flex; flex-direction: column; align-items: center; max-width: 600px; margin: 0 auto; width: 100%; }
        h1 { font-family: 'Syne'; font-size: 28px; font-weight: 800; margin-bottom: 32px; text-align: center; }

        .player-list { width: 100%; display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
        .player-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 16px 20px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }
        .player-card span { font-weight: 600; font-size: 15px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 10px var(--green); }

        .controls { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .btn {
            width: 100%; padding: 20px; border-radius: 16px; border: none; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: 0.3s;
        }
        .btn-start { background: var(--primary); color: #fff; display: none; }
        .btn-start:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-exit { background: var(--surface); color: var(--text-dim); border: 1px solid var(--border); }
        .btn-nuclear { background: #ff4d4d; color: #fff; display: none; }

        #status-msg { font-size: 14px; color: var(--text-dim); margin-bottom: 16px; text-align: center; }
    </style>
</head>
<body>
    <header class="header">
        <a href="/hub.html" class="logo">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl5O38UyupxU5PU6W5jXASsMVPWHyg6ylDIg&s">
            <span>Mejores Amigos</span>
        </a>
    </header>

    <main class="lobby-container">
        <h1>Auction Room</h1>
        <div id="status-msg">Waiting for participants...</div>
        <div class="player-list" id="p-list"></div>
        <div class="controls">
            <button class="btn btn-start" id="start-btn" disabled>START AUCTION</button>
            <button class="btn btn-nuclear" id="reset-btn">RESET ROOM</button>
            <button class="btn btn-exit" onclick="location.href='/hub.html'">EXIT ROOM</button>
        </div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('mejoresAmigosUser'));
        if(!user) location.href='/index.html';

        const socket = io('/auction');
        socket.emit('joinAuction', { name: user.name, isAdmin: user.isAuctionAdmin });

        socket.on('stateUpdate', (state) => {
            const list = document.getElementById('p-list');
            list.innerHTML = state.players.map(p => `
                <div class="player-card">
                    <span>${p.isAdmin ? '👑 ' : ''}${p.name}</span>
                    <div class="status-dot"></div>
                </div>
            `).join('');

            const startBtn = document.getElementById('start-btn');
            if(user.isAuctionAdmin) {
                startBtn.style.display = 'block';
                startBtn.disabled = state.players.length < 4;
                document.getElementById('status-msg').textContent = `Room ready (${state.players.length}/8)`;
            } else {
                document.getElementById('status-msg').textContent = `${state.players.length}/8 players joined.`;
            }

            if(state.gameStatus === 'active') location.href = '/auction/index.html';
        });

        document.getElementById('start-btn').onclick = () => socket.emit('startAuction');
        const resetBtn = document.getElementById('reset-btn');
        if(user.isAuctionAdmin) {
            resetBtn.style.display = 'block';
            resetBtn.onclick = () => { if(confirm('RESET ALL? This will clear all players.')) socket.emit('resetLobby'); };
        }
        socket.on('lobbyReset', () => { alert('Room reset by admin.'); location.href='/hub.html'; });
    </script>
</body>
</html>
