<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arena — Mejores Amigos</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: #0a0a0f; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .top-btns { display: flex; gap: 8px; }
        .pill { background: rgba(255,255,255,0.05); padding: 6px 14px; border-radius: 100px; font-size: 11px; font-weight: 800; border: 1px solid var(--border); color: #fff; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; }
        .pill.leave { border-color: var(--error); color: var(--error); }
        .pill.accent { color: var(--accent); border-color: var(--accent); }

        .player-bar { background: rgba(0,0,0,0.3); padding: 10px 20px; display: flex; gap: 10px; overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; }
        .player-bar::-webkit-scrollbar { display: none; }
        .p-chip { display: flex; align-items: center; gap: 6px; background: var(--surface); padding: 4px 10px; border-radius: 100px; border: 1px solid var(--border); white-space: nowrap; }
        .p-dot { width: 8px; height: 8px; border-radius: 50%; background: #444; }
        .p-dot.online { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .p-init { font-weight: 900; font-size: 10px; color: var(--accent); }

        .main-stage { flex: 1; padding: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .player-card { width: 100%; max-width: 400px; background: var(--bg-secondary); border-radius: 40px; border: 1px solid var(--border); padding: 40px 24px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.4); animation: slideUp 0.6s forwards; position: relative; z-index: 10; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .pos-tag { padding: 6px 16px; border-radius: 100px; font-size: 11px; font-weight: 800; margin-bottom: 20px; display: inline-block; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.1); }
        .pos-gk { background: #FACC15; color: #000; } .pos-def { background: #3B82F6; } .pos-mid { background: #22C55E; } .pos-fwd { background: #EF4444; }
        #p-name { font-family: 'Syne'; font-size: 36px; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 32px; line-height: 1; }

        .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 20px; text-align: center; }
        .stat-val { font-size: 20px; font-weight: 800; }
        #timer.urgent { color: var(--error); animation: pulseRed 0.5s infinite alternate; }
        @keyframes pulseRed { from { opacity: 1; } to { opacity: 0.6; } }

        .bid-controls { width: 100%; max-width: 400px; }
        .bid-row { display: grid; grid-template-columns: 1fr 80px; gap: 12px; }
        .btn-bid { background: #fff; color: #000; flex: 1; font-weight: 900; }
        .btn-bid:disabled { background: #333; color: #888; }

        #bid-msg { position: absolute; top: 12%; left: 0; width: 100%; text-align: center; font-family: 'Syne'; font-size: 24px; font-weight: 800; color: var(--accent); opacity: 0; transition: 0.4s; z-index: 50; }
        #bid-msg.show { opacity: 1; transform: translateY(-20px); }

        .admin-tray { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; border-top: 1px solid var(--border); padding: 12px 20px; display: none; gap: 10px; z-index: 2000; }
        .footer-counts { background: var(--bg-secondary); padding: 12px; border-top: 1px solid var(--border); display: flex; justify-content: center; gap: 15px; font-size: 10px; font-weight: 800; color: var(--text-dim); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 4000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-card { width: 100%; max-width: 400px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 32px; padding: 24px; display: flex; flex-direction: column; max-height: 80vh; }
        .modal-tabs { display: flex; gap: 12px; margin-bottom: 20px; }
        .tab { color: var(--text-dim); font-size: 13px; font-weight: 800; cursor: pointer; border-bottom: 2px solid transparent; padding-bottom: 4px; }
        .tab.active { color: var(--accent); border-color: var(--accent); }
        .roster-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .roster-item { background: var(--surface); padding: 12px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; }
        .roster-item .owner { font-size: 9px; color: var(--accent); font-weight: 900; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>
    <div id="toast"></div>
    <div id="bid-msg">NEW BID!</div>

    <header class="header">
        <div class="top-btns">
            <div class="pill leave" onclick="leaveArena()">LEAVE</div>
            <div class="pill" id="squad-btn" onclick="openModal('my')">SQUAD</div>
        </div>
        <div class="pill accent" onclick="openModal('all')" id="u-budget">₹15.00 Cr</div>
    </header>

    <div class="player-bar" id="p-bar"></div>

    <main class="main-stage">
        <div class="player-card">
            <div id="watch-msg" style="position:absolute; top:-30px; left:0; width:100%; font-size:10px; font-weight:900; color:var(--accent); display:none;">WATCHING MODE — POSITION FULL</div>
            <div class="pos-tag" id="p-pos">...</div>
            <h1 id="p-name">LOADING</h1>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:24px;">
                <div class="stat-box">
                    <div style="font-size:10px; color:var(--text-dim);">HIGH BID</div>
                    <div class="stat-val" id="curr-bid" style="color:var(--accent);">₹5L</div>
                </div>
                <div class="stat-box">
                    <div style="font-size:10px; color:var(--text-dim);">TIMER</div>
                    <div class="stat-val" id="timer">10s</div>
                </div>
            </div>
            <div class="bid-controls">
                <div class="bid-row">
                    <button class="btn btn-bid" id="bid-btn" disabled>PLACE BID</button>
                    <button class="btn btn-outline" onclick="openCustom()"><i class="fas fa-keyboard"></i></button>
                </div>
                <div id="bid-error" style="font-size:11px; color:var(--error); margin-top:8px; font-weight:700;"></div>
            </div>
        </div>
    </main>

    <div class="footer-counts" id="counts"></div>

    <div id="admin-area" class="admin-tray">
        <button class="btn btn-outline" style="flex:1;" id="pause-btn">PAUSE</button>
        <button class="btn btn-primary" style="flex:1;" onclick="if(confirm('Force Stop & Save Current Teams?')) socket.emit('forceStop')">FORCE STOP</button>
    </div>

    <!-- Universal Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal-card">
            <div class="modal-tabs">
                <div class="tab" id="tab-my" onclick="showTab('my')">MY SQUAD</div>
                <div class="tab" id="tab-all" onclick="showTab('all')">GLOBAL SALES</div>
            </div>
            <div class="roster-list" id="list"></div>
            <button class="btn btn-outline w-full" onclick="closeModal()">CLOSE</button>
        </div>
    </div>

    <!-- Are You Here Modal -->
    <div class="modal-overlay" id="here-modal">
        <div class="modal-card">
            <h2 style="font-family:Syne; color:var(--accent);">ARE YOU THERE?</h2>
            <p style="margin:20px 0; color:var(--text-dim);">You have been inactive for 10 mins. Click to stay in the arena!</p>
            <button class="btn btn-accent w-full" onclick="iAmHere()">YES, I'M HERE BRO</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io('/auction');
        const user = JSON.parse(localStorage.getItem('auctionUser'));
        if(!user) location.href = '/auction/login';

        let lastT = 0, tInt = null, lastBid = 0, gS = null, activeTab = 'my';

        function formatM(l) { return l < 100 ? `₹${l}L` : `₹${(l/100).toFixed(2)}Cr`; }
        function showT(m) { const t = document.getElementById('toast'); t.textContent = m; t.className = 'show'; setTimeout(() => t.className = '', 3000); }

        socket.emit('joinAuction', { name: user.name, isAdmin: user.isAuctionAdmin });
        socket.on('notification', d => showT(d.message));
        socket.on('areYouHere', () => document.getElementById('here-modal').style.display = 'flex');
        socket.on('redirect', url => location.href = url);

        socket.on('stateUpdate', s => {
            gS = s;
            if(s.gameStatus === 'finished') location.href = '/auction/results';

            document.getElementById('p-bar').innerHTML = s.players.map(p => `
                <div class="p-chip">
                    <div class="p-dot ${p.connected ? 'online' : ''}"></div>
                    <span class="p-init">${p.name.charAt(0)}</span>
                    <span style="font-size:10px; font-weight:700;">${p.name}</span>
                </div>
            `).join('');

            if(user.isAuctionAdmin) {
                document.getElementById('admin-area').style.display = 'flex';
                document.getElementById('pause-btn').textContent = s.isPaused ? 'RESUME' : 'PAUSE';
                document.getElementById('pause-btn').onclick = () => socket.emit(s.isPaused ? 'resume' : 'pause');
            }
            if(s.currentPlayer) {
                const el = document.getElementById('p-pos');
                el.textContent = s.currentPlayer.position;
                el.className = 'pos-tag pos-' + s.currentPlayer.position.toLowerCase();
                document.getElementById('p-name').textContent = s.currentPlayer.name.toUpperCase();
            }
            if(s.currentBid !== lastBid && lastBid !== 0) {
                const bmsg = document.getElementById('bid-msg');
                bmsg.textContent = `${s.currentBidder} BID ${formatM(s.currentBid)}`;
                bmsg.className = 'show';
                setTimeout(() => bmsg.className = '', 2000);
            }
            lastBid = s.currentBid;
            document.getElementById('curr-bid').textContent = formatM(s.currentBid);

            const me = s.players.find(x => x.name === user.name);
            if(me) {
                document.getElementById('u-budget').textContent = formatM(me.budget);
                document.getElementById('counts').innerHTML = `
                    <span>GK ${me.positions.GK}/3</span>
                    <span>DEF ${me.positions.DEF}/5</span>
                    <span>MID ${me.positions.MID}/5</span>
                    <span>FWD ${me.positions.FWD}/5</span>
                `;

                const posFull = me.positions[s.currentPlayer?.position] >= (s.currentPlayer?.position==='GK'?3:5);
                document.getElementById('watch-msg').style.display = posFull ? 'block' : 'none';

                const bb = document.getElementById('bid-btn');
                const next = s.currentBid + 5;
                bb.textContent = `BID ${formatM(next)}`;
                bb.disabled = (s.currentBidder === user.name || s.isPaused || me.budget < next || posFull || me.teamSize >= 18);
                bb.onclick = () => socket.emit('bid', next);

                if(document.getElementById('modal').style.display === 'flex') renderList();
            }

            if(s.timerEnd !== lastT) {
                lastT = s.timerEnd;
                if(tInt) clearInterval(tInt);
                tInt = setInterval(() => {
                    const rem = Math.max(0, Math.floor((s.timerEnd - Date.now()) / 1000));
                    const d = document.getElementById('timer');
                    d.textContent = rem + 's';
                    d.className = rem <= 3 ? 'stat-val urgent' : 'stat-val';
                }, 100);
            }
        });

        function leaveArena() { if(confirm('Leave Arena? ALL progress and your team will be PERMANENTLY lost.')) socket.emit('leaveArena'); }
        function iAmHere() { document.getElementById('here-modal').style.display = 'none'; socket.emit('iAmHere'); }
        function openCustom() {
            const a = parseInt(prompt("Amount in Lakhs (multiple of 5):"));
            if(a && a % 5 === 0) socket.emit('bid', a);
        }
        function openModal(t) { activeTab = t; document.getElementById('modal').style.display = 'flex'; renderList(); }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function showTab(t) { activeTab = t; renderList(); }

        function renderList() {
            const list = document.getElementById('list');
            document.getElementById('tab-my').className = activeTab === 'my' ? 'tab active' : 'tab';
            document.getElementById('tab-all').className = activeTab === 'all' ? 'tab active' : 'tab';

            if(activeTab === 'my') {
                const me = gS.players.find(x => x.name === user.name);
                list.innerHTML = me.team.map(p => `
                    <div class="roster-item">
                        <span>${p.name} <span style="font-size:9px; color:var(--text-dim)">${p.position}</span></span>
                        <span style="color:var(--accent); font-weight:800">${formatM(p.price)}</span>
                    </div>
                `).reverse().join('') || '<div style="text-align:center; padding:20px; color:var(--text-dim)">Empty squad.</div>';
            } else {
                let sales = [];
                gS.players.forEach(p => p.team.forEach(t => sales.push({...t, owner: p.name})));
                sales.sort((a,b) => b.price - a.price);
                list.innerHTML = sales.map(s => `
                    <div class="roster-item" style="border-left:2px solid var(--accent)">
                        <div>
                            <span class="owner">${s.owner.toUpperCase()}</span>
                            <span>${s.name} <span style="font-size:9px; color:var(--text-dim)">${s.position}</span></span>
                        </div>
                        <span style="color:var(--accent); font-weight:800">${formatM(s.price)}</span>
                    </div>
                `).join('') || '<div style="text-align:center; padding:20px; color:var(--text-dim)">No sales yet.</div>';
            }
        }
    </script>
</body>
</html>
