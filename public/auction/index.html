<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mejores Amigos — Live Auction</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #07070a;
            --surface: #0f0f18;
            --acc-gold: #f5b942;
            --acc-red: #f87171;
            --acc-green: #4ade80;
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'DM Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; min-height: 100vh; }

        .header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(15,15,24,0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { display: flex; align-items: center; gap: 12px; font-family: 'Syne'; font-weight: 800; font-size: 20px; text-decoration: none; color: inherit; }
        .logo img { width: 40px; height: 40px; border-radius: 10px; }

        .container { max-width: 1400px; margin: 40px auto; padding: 0 40px; display: grid; grid-template-columns: 1fr 350px; gap: 40px; }

        .auction-card {
            background: var(--surface);
            border-radius: 32px;
            border: 1px solid var(--border);
            padding: 50px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .pos-badge {
            background: rgba(255,255,255,0.05);
            padding: 8px 20px;
            border-radius: 100px;
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 1px;
            color: var(--acc-gold);
            border: 1px solid rgba(245, 185, 66, 0.2);
            margin-bottom: 24px;
        }

        #playerName { font-family: 'Syne'; font-size: 56px; font-weight: 800; letter-spacing: -2px; margin-bottom: 40px; }

        .display-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; width: 100%; margin-bottom: 40px; }
        .disp-box { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 24px; padding: 30px; }
        .disp-label { font-size: 14px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .disp-val { font-size: 38px; font-weight: 800; font-family: 'Syne'; }

        #timerDisplay { color: var(--acc-gold); transition: 0.3s; }
        #timerDisplay.urgent { color: var(--acc-red); transform: scale(1.1); }

        .bid-controls { width: 100%; display: grid; grid-template-columns: 1fr 200px; gap: 20px; }
        .btn-bid {
            background: var(--acc-gold);
            color: #000;
            border: none;
            border-radius: 20px;
            padding: 24px;
            font-family: 'Syne';
            font-weight: 800;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-bid:hover:not(:disabled) { transform: translateY(-4px); box-shadow: 0 15px 30px rgba(245, 185, 66, 0.3); }
        .btn-bid:disabled { background: #333; color: #666; cursor: not-allowed; }

        .btn-custom {
            background: rgba(255,255,255,0.05);
            color: #fff;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-custom:hover { background: rgba(255,255,255,0.1); }

        .sidebar { display: flex; flex-direction: column; gap: 24px; }
        .side-box { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 24px; }
        .side-title { font-family: 'Syne'; font-weight: 800; font-size: 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: var(--text-dim); }

        .stat-line { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .stat-line:last-child { border: none; }
        .stat-name { font-weight: 500; }
        .stat-val { font-weight: 700; color: var(--acc-gold); }

        .participant { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; }
        .p-info { display: flex; align-items: center; gap: 10px; }
        .p-status { width: 8px; height: 8px; border-radius: 50%; background: #444; }
        .p-status.online { background: var(--acc-green); box-shadow: 0 0 10px var(--acc-green); }

        /* Admin Panel */
        .admin-panel { border-color: var(--acc-red); }
        .admin-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        .btn-pause { background: #6366f1; color: #fff; }
        .btn-dismiss { background: var(--acc-red); color: #fff; display: none; }
        .btn-end { background: #000; color: #fff; border: 1px solid #333; }

        /* Toast / Notification */
        #toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #fff;
            color: #000;
            padding: 16px 32px;
            border-radius: 100px;
            font-weight: 800;
            z-index: 1000;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
        #toast.success { background: var(--acc-green); }
        #toast.error { background: var(--acc-red); color: #fff; }

        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: var(--surface); border: 1px solid var(--border); padding: 40px; border-radius: 32px; width: 100%; max-width: 600px; max-height: 80vh; overflow-y: auto; }

        #pauseOverlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            z-index: 500; display: none; flex-direction: column; align-items: center; justify-content: center;
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; padding: 20px; }
            #playerName { font-size: 38px; }
        }
    </style>
</head>
<body>
    <div id="pauseOverlay">
        <h1 style="font-family:'Syne'; font-size:4rem; color:var(--acc-gold);">PAUSED</h1>
        <p style="color:var(--text-dim);">Waiting for admin to resume...</p>
    </div>

    <div id="toast"></div>

    <header class="header">
        <a href="/hub.html" class="logo">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl5O38UyupxU5PU6W5jXASsMVPWHyg6ylDIg&s">
            <span>Mejores Amigos</span>
        </a>
        <div id="self-stats" style="display:flex; gap:20px; font-weight:700;">
            <span id="u-name">...</span>
            <span id="u-budget" style="color:var(--acc-gold);">₹15.00 Cr</span>
        </div>
    </header>

    <main class="container">
        <section class="main-auction">
            <div class="auction-card">
                <div class="pos-badge" id="playerPos">POSITION</div>
                <h1 id="playerName">WAITING...</h1>

                <div class="display-grid">
                    <div class="disp-box">
                        <div class="disp-label">Highest Bid</div>
                        <div class="disp-val" id="currentBid">₹5 Lakh</div>
                        <div style="font-size:14px; color:var(--text-dim); margin-top:5px;" id="bidderName">No bids yet</div>
                    </div>
                    <div class="disp-box">
                        <div class="disp-label">Time Remaining</div>
                        <div class="disp-val" id="timerDisplay">10s</div>
                    </div>
                </div>

                <div class="bid-controls">
                    <button class="btn-bid" id="bidBtn" disabled>PLACE BID</button>
                    <button class="btn-custom" onclick="openCustomBid()">CUSTOM</button>
                </div>
            </div>
        </section>

        <aside class="sidebar">
            <div class="side-box">
                <div class="side-title"><i class="fas fa-chart-pie"></i> My Squad Stats</div>
                <div class="stat-line"><span>Total Players</span><span class="stat-val" id="squadSize">0/18</span></div>
                <div class="stat-line"><span>Goalkeepers</span><span class="stat-val" id="gkCount">0/3</span></div>
                <div class="stat-line"><span>Defenders</span><span class="stat-val" id="defCount">0/5</span></div>
                <div class="stat-line"><span>Midfielders</span><span class="stat-val" id="midCount">0/5</span></div>
                <div class="stat-line"><span>Forwards</span><span class="stat-val" id="fwdCount">0/5</span></div>
                <button class="admin-btn" style="background:rgba(255,255,255,0.05); color:#fff; margin-top:15px;" onclick="socket.emit('getMyTeam')">View My Team</button>
            </div>

            <div class="side-box">
                <div class="side-title"><i class="fas fa-users"></i> Participants</div>
                <div id="participantsList"></div>
            </div>

            <div id="adminArea" class="side-box admin-panel" style="display:none;">
                <div class="side-title" style="color:var(--acc-red);"><i class="fas fa-crown"></i> Admin Controls</div>
                <button class="admin-btn btn-pause" id="pauseBtn">PAUSE AUCTION</button>
                <button class="admin-btn btn-dismiss" id="dismissBtn">DISMISS (5s LEFT)</button>
                <button class="admin-btn btn-end" onclick="confirmEnd()">EMERGENCY END</button>
            </div>
        </aside>
    </main>

    <div class="modal" id="genericModal">
        <div class="modal-content">
            <h2 id="modalTitle" style="font-family:'Syne'; margin-bottom:20px;"></h2>
            <div id="modalBody"></div>
            <button class="admin-btn" style="margin-top:20px; background:#333; color:#fff;" onclick="closeModal()">CLOSE</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io('/auction');
        const user = JSON.parse(localStorage.getItem('mejoresAmigosUser'));
        if(!user) location.href = '/';

        let lastTimerEnd = 0;
        let timerInterval = null;

        function formatMoney(lakhs) {
            if (lakhs < 100) return `₹${lakhs} Lakh`;
            return `₹${(lakhs/100).toFixed(2)} Crore`;
        }

        function showToast(msg, type='info') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'show ' + type;
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        socket.emit('joinAuction', { name: user.name, isAdmin: user.isAdmin });

        socket.on('notification', (data) => {
            showToast(data.message, data.type);
        });

        socket.on('stateUpdate', (state) => {
            if (state.gameStatus === 'finished') {
                location.href = '/auction/results.html';
                return;
            }

            document.getElementById('pauseOverlay').style.display = state.isPaused ? 'flex' : 'none';

            if (user.isAdmin) {
                document.getElementById('adminArea').style.display = 'block';
                const pBtn = document.getElementById('pauseBtn');
                pBtn.textContent = state.isPaused ? 'RESUME AUCTION' : 'PAUSE AUCTION';
                pBtn.onclick = () => socket.emit(state.isPaused ? 'resume' : 'pause');
            }

            const player = state.currentPlayer;
            if (player) {
                document.getElementById('playerName').textContent = player.name.toUpperCase();
                document.getElementById('playerPos').textContent = player.position;
            }

            document.getElementById('currentBid').textContent = formatMoney(state.currentBid);
            document.getElementById('bidderName').textContent = state.currentBidder ? `Highest Bidder: ${state.currentBidder}` : 'No bids yet';

            const nextBid = state.currentBid + 5;
            const bidBtn = document.getElementById('bidBtn');
            bidBtn.textContent = `BID ${formatMoney(nextBid)}`;
            bidBtn.disabled = (state.currentBidder === user.name || state.isPaused);
            bidBtn.onclick = () => socket.emit('bid', nextBid);

            // Participants
            const pList = document.getElementById('participantsList');
            pList.innerHTML = state.players.map(p => `
                <div class="participant">
                    <div class="p-info">
                        <div class="p-status ${p.connected ? 'online' : ''}"></div>
                        <span style="font-weight:700;">${p.isAdmin ? '👑 ' : ''}${p.name}</span>
                    </div>
                    <span style="color:var(--acc-gold); font-weight:800;">${formatMoney(p.budget)}</span>
                </div>
            `).join('');

            // Self stats
            const me = state.players.find(x => x.name === user.name);
            if (me) {
                document.getElementById('u-name').textContent = me.name + (me.isAdmin ? ' 👑' : '');
                document.getElementById('u-budget').textContent = formatMoney(me.budget);
                document.getElementById('squadSize').textContent = me.teamSize + '/18';
                document.getElementById('gkCount').textContent = me.positions.GK + '/3';
                document.getElementById('defCount').textContent = me.positions.DEF + '/5';
                document.getElementById('midCount').textContent = me.positions.MID + '/5';
                document.getElementById('fwdCount').textContent = me.positions.FWD + '/5';
            }

            // Timer synchronization
            if (state.timerEnd !== lastTimerEnd) {
                lastTimerEnd = state.timerEnd;
                startTimer(state.timerEnd, state.isPaused);
            }

            // Dismiss logic
            if (user.isAdmin) {
                const rem = Math.floor((state.timerEnd - Date.now()) / 1000);
                const dBtn = document.getElementById('dismissBtn');
                if (!state.currentBidder && rem <= 5 && rem > 0) {
                    dBtn.style.display = 'block';
                    dBtn.onclick = () => socket.emit('dismiss');
                } else {
                    dBtn.style.display = 'none';
                }
            }
        });

        function startTimer(end, paused) {
            if (timerInterval) clearInterval(timerInterval);
            if (paused) {
                const rem = Math.max(0, Math.floor((end - Date.now()) / 1000));
                document.getElementById('timerDisplay').textContent = rem + 's';
                return;
            }

            timerInterval = setInterval(() => {
                const rem = Math.max(0, Math.floor((end - Date.now()) / 1000));
                const display = document.getElementById('timerDisplay');
                display.textContent = rem + 's';

                if (rem <= 3) display.classList.add('urgent');
                else display.classList.remove('urgent');

                if (rem <= 0) clearInterval(timerInterval);
            }, 100); // 100ms for smoother visual feel
        }

        socket.on('myTeamData', (team) => {
            const body = team.length ? `
                <table style="width:100%; border-collapse:collapse;">
                    ${team.map(p => `<tr style="border-bottom:1px solid #222;"><td style="padding:10px;">${p.name}</td><td style="color:var(--acc-gold); text-align:right;">${formatMoney(p.price)}</td></tr>`).join('')}
                </table>
            ` : '<p>No players yet.</p>';
            openModal('My Squad', body);
        });

        function openModal(title, body) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = body;
            document.getElementById('genericModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('genericModal').style.display = 'none'; }

        function openCustomBid() {
            const val = prompt("Enter custom bid amount (must be multiple of 5 Lakhs):");
            const amt = parseInt(val);
            if (!isNaN(amt) && amt % 5 === 0) {
                socket.emit('bid', amt);
            } else if (val !== null) {
                alert("Invalid amount. Must be a multiple of 5.");
            }
        }

        function confirmEnd() {
            if (prompt('Type "END" to confirm emergency auction termination:') === 'END') {
                socket.emit('emergencyEnd', 'END');
            }
        }
    </script>
</body>
</html>
