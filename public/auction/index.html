<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Auction — Mejores Amigos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #FFFFFF;
            --primary: #111111;
            --accent: #F5B942;
            --surface: #F9F9FB;
            --text-dim: #666666;
            --border: #EEEEEE;
            --red: #FF4D4D;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--primary); min-height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        .header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #fff; z-index: 100; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
        .logo img { width: 32px; height: 32px; border-radius: 8px; }
        .logo span { font-family: 'Syne'; font-size: 18px; font-weight: 800; }

        .user-stats { display: flex; gap: 16px; align-items: center; }
        .budget-pill { background: var(--surface); padding: 8px 16px; border-radius: 100px; font-weight: 800; font-size: 13px; border: 1px solid var(--border); color: var(--accent); }

        .main-stage { flex: 1; padding: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

        #pause-banner {
            position: fixed; top: 0; left: 0; width: 100%; background: var(--accent); color: #000; padding: 12px;
            text-align: center; font-weight: 800; font-family: 'Syne'; z-index: 1000; display: none;
        }

        .player-card {
            width: 100%; max-width: 440px; background: #fff; border-radius: 40px; border: 1px solid var(--border);
            padding: 48px 32px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.04);
            animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .pos-tag {
            background: var(--surface); padding: 6px 16px; border-radius: 100px; font-size: 12px; font-weight: 800;
            letter-spacing: 1px; color: var(--accent); border: 1px solid var(--border); margin-bottom: 24px; display: inline-block;
        }

        #p-name { font-family: 'Syne'; font-size: 40px; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 32px; line-height: 1; color: var(--primary); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 100%; margin-bottom: 32px; }
        .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 24px; text-align: center; }
        .stat-lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; letter-spacing: 0.5px; }
        .stat-val { font-size: 22px; font-weight: 800; font-family: 'Inter'; }

        #timer { color: var(--primary); }
        #timer.urgent { color: var(--red); transform: scale(1.1); transition: 0.2s; }

        .controls { width: 100%; max-width: 440px; display: grid; grid-template-columns: 1fr 100px; gap: 12px; }
        .btn { padding: 20px; border-radius: 20px; border: none; font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-bid { background: var(--primary); color: #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn-bid:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-custom { background: var(--surface); color: var(--primary); border: 1px solid var(--border); }

        #bidder-name { font-size: 13px; font-weight: 700; color: var(--text-dim); margin-top: 6px; display: block; }

        /* Admin Bottom Tray */
        .admin-tray {
            position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; border-top: 1px solid var(--border);
            padding: 16px 24px; display: none; gap: 12px; z-index: 2000;
        }
        .admin-btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: 700; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .btn-pause { background: var(--surface); color: var(--primary); border: 1px solid var(--border); }
        .btn-dismiss { background: var(--red); color: #fff; display: none; }
        .btn-end { background: #000; color: #fff; }

        #toast {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: var(--primary); color: #fff; padding: 14px 28px; border-radius: 100px;
            font-size: 14px; font-weight: 700; transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1); z-index: 3000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        .footer-counts { background: var(--surface); padding: 16px; border-top: 1px solid var(--border); display: flex; justify-content: center; gap: 20px; font-size: 11px; font-weight: 800; color: var(--text-dim); }
        .count-item span { color: var(--primary); }
    </style>
</head>
<body>
    <div id="pause-banner">AUCTION PAUSED BY ADMIN</div>
    <div id="toast"></div>

    <header class="header">
        <a href="/hub.html" class="logo">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl5O38UyupxU5PU6W5jXASsMVPWHyg6ylDIg&s">
            <span>Mejores Amigos</span>
        </a>
        <div class="user-stats">
            <div class="budget-pill" id="u-budget">₹15.00 Crore</div>
        </div>
    </header>

    <main class="main-stage">
        <div class="player-card">
            <div class="pos-tag" id="p-pos">POSITION</div>
            <h1 id="p-name">LOADING...</h1>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-lbl">Highest Bid</div>
                    <div class="stat-val" id="curr-bid">₹5 Lakh</div>
                    <span id="bidder-name">Starting price</span>
                </div>
                <div class="stat-box">
                    <div class="stat-lbl">Time Left</div>
                    <div class="stat-val" id="timer">10s</div>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-bid" id="bid-btn" disabled>PLACE BID</button>
                <button class="btn btn-custom" onclick="openCustom()"><i class="fas fa-edit"></i></button>
            </div>
        </div>
    </main>

    <div class="footer-counts" id="f-counts">
        <div class="count-item">GK <span id="c-gk">0/3</span></div>
        <div class="count-item">DEF <span id="c-def">0/5</span></div>
        <div class="count-item">MID <span id="c-mid">0/5</span></div>
        <div class="count-item">FWD <span id="c-fwd">0/5</span></div>
        <div class="count-item">TOTAL <span id="c-total">0/18</span></div>
    </div>

    <div id="admin-area" class="admin-tray">
        <button class="admin-btn btn-pause" id="pause-btn">PAUSE</button>
        <button class="admin-btn btn-dismiss" id="dismiss-btn">DISMISS</button>
        <button class="admin-btn btn-end" onclick="confirmEnd()">EMERGENCY END</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io('/auction');
        const user = JSON.parse(localStorage.getItem('auctionUser'));
        if(!user) window.location.href = '/auction/login';

        let lastT = 0;
        let tInt = null;

        function formatM(l) {
            if (l < 100) return `₹${l} Lakh`;
            return `₹${(l/100).toFixed(2)} Crore`;
        }
        function showT(m) { const t = document.getElementById('toast'); t.textContent = m; t.className = 'show'; setTimeout(() => t.className = '', 3000); }

        socket.emit('joinAuction', { name: user.name, isAdmin: user.isAuctionAdmin });
        socket.on('notification', (d) => showT(d.message));

        socket.on('stateUpdate', (s) => {
            if (s.gameStatus === 'finished') { window.location.href = '/auction/results'; return; }
            document.getElementById('pause-banner').style.display = s.isPaused ? 'block' : 'none';
            if (user.isAuctionAdmin) {
                document.getElementById('admin-area').style.display = 'flex';
                const pb = document.getElementById('pause-btn');
                pb.textContent = s.isPaused ? 'RESUME' : 'PAUSE';
                pb.onclick = () => socket.emit(s.isPaused ? 'resume' : 'pause');
            }

            if (s.currentPlayer) {
                document.getElementById('p-name').textContent = s.currentPlayer.name.toUpperCase();
                document.getElementById('p-pos').textContent = s.currentPlayer.position;
            }

            document.getElementById('curr-bid').textContent = formatM(s.currentBid);
            document.getElementById('bidder-name').textContent = s.currentBidder ? `By ${s.currentBidder}` : 'Starting price';

            const bb = document.getElementById('bid-btn');
            const next = s.currentBid + 5;
            bb.textContent = `BID ${formatM(next)}`;
            bb.disabled = (s.currentBidder === user.name || s.isPaused);
            bb.onclick = () => socket.emit('bid', next);

            const me = s.players.find(x => x.name === user.name);
            if (me) {
                document.getElementById('u-budget').textContent = formatM(me.budget);
                document.getElementById('c-gk').textContent = me.positions.GK + '/3';
                document.getElementById('c-def').textContent = me.positions.DEF + '/5';
                document.getElementById('c-mid').textContent = me.positions.MID + '/5';
                document.getElementById('c-fwd').textContent = me.positions.FWD + '/5';
                document.getElementById('c-total').textContent = me.teamSize + '/18';
            }

            if (s.timerEnd !== lastT) { lastT = s.timerEnd; runT(s.timerEnd, s.isPaused); }

            if (user.isAuctionAdmin) {
                const rem = Math.floor((s.timerEnd - Date.now()) / 1000);
                const db = document.getElementById('dismiss-btn');
                if (!s.currentBidder && rem <= 5 && rem > 0) {
                    db.style.display = 'block';
                    db.onclick = () => socket.emit('dismiss');
                } else db.style.display = 'none';
            }
        });

        function runT(e, p) {
            if (tInt) clearInterval(tInt);
            if (p) { const rem = Math.max(0, Math.floor((e - Date.now()) / 1000)); document.getElementById('timer').textContent = rem + 's'; return; }
            tInt = setInterval(() => {
                const rem = Math.max(0, Math.floor((e - Date.now()) / 1000));
                const d = document.getElementById('timer');
                d.textContent = rem + 's';
                if (rem <= 3) d.className = 'stat-val urgent'; else d.className = 'stat-val';
                if (rem <= 0) clearInterval(tInt);
            }, 100);
        }

        function openCustom() {
            const v = prompt("Enter amount in Lakhs (multiple of 5):");
            const a = parseInt(v);
            if (!isNaN(a) && a % 5 === 0) socket.emit('bid', a);
            else if (v !== null) alert("Must be multiple of 5.");
        }

        function confirmEnd() { if (prompt('Type "END" to finish:') === 'END') socket.emit('emergencyEnd', 'END'); }
    </script>
</body>
</html>
