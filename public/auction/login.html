<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auction Login — Mejores Amigos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #FFFFFF; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { width: 100%; max-width: 400px; background: #fff; border: 1px solid #EEEEEE; border-radius: 32px; padding: 48px 32px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.04); animation: slideUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .logo { width: 64px; height: 64px; border-radius: 16px; margin-bottom: 24px; }
        h1 { font-family: 'Syne'; font-size: 32px; margin-bottom: 12px; letter-spacing: -1px; }
        p { color: #666; font-size: 14px; margin-bottom: 32px; }
        input { width: 100%; background: #F9F9FB; border: 1px solid #EEEEEE; padding: 18px; border-radius: 16px; margin-bottom: 16px; outline: none; transition: 0.2s; font-size: 16px; }
        input:focus { border-color: #111; background: #fff; box-shadow: 0 0 0 4px rgba(0,0,0,0.02); }
        .btn { width: 100%; background: #111; color: #fff; border: none; padding: 20px; border-radius: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        #err { color: #ff4d4d; font-size: 13px; margin-top: 16px; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl5O38UyupxU5PU6W5jXASsMVPWHyg6ylDIg&s" class="logo">
        <h1>Auction Entry</h1>
        <p>Join the live player auction</p>
        <form id="auction-login">
            <input type="text" id="a-name" placeholder="Enter Name" required autocomplete="off">
            <input type="password" id="a-pass" placeholder="Auction PIN" style="display:none;">
            <button type="submit" class="btn">JOIN ROOM</button>
            <div id="err"></div>
        </form>
    </div>

    <script>
        const ni = document.getElementById('a-name');
        const pi = document.getElementById('a-pass');
        ni.oninput = () => { pi.style.display = ni.value.toLowerCase().endsWith('admin') ? 'block' : 'none'; };
        document.getElementById('auction-login').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/api/auction/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: ni.value, password: pi.value })
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('auctionUser', JSON.stringify(data.user));
                location.href = '/auction/lobby';
            } else {
                const err = document.getElementById('err');
                err.textContent = data.error;
                err.style.display = 'block';
            }
        };
    </script>
</body>
</html>
