<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auction Entry — Mejores Amigos</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: var(--bg); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { width: 100%; max-width: 380px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 32px; padding: 40px 32px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        h1 { font-family: 'Syne'; font-size: 32px; margin-bottom: 8px; color: #fff; }
        p { color: var(--text-dim); font-size: 14px; margin-bottom: 40px; font-weight: 500; }
        input { margin-bottom: 16px; }
        .back-link { margin-top: 24px; display: block; color: var(--text-dim); font-weight: 600; text-decoration: none; font-size: 13px; }
        .back-link:hover { color: #fff; }
        .invite-notice { background: rgba(245, 185, 66, 0.1); border: 1px solid rgba(245, 185, 66, 0.2); color: var(--accent); padding: 12px; border-radius: 16px; font-size: 12px; margin-bottom: 24px; font-weight: 600; display: none; }
    </style>
</head>
<body>
    <div class="login-card animate-up">
        <div id="invite-notice" class="invite-notice">You were invited! Enter your name to join.</div>

        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl5O38UyupxU5PU6W5jXASsMVPWHyg6ylDIg&s" class="logo-round" style="width:64px; height:64px; margin:0 auto 24px; display:block;">
        <h1>Auction Entry</h1>
        <p>Join the live player arena</p>

        <form id="auction-login">
            <input type="text" id="a-name" class="input-field" placeholder="Player Name" required autocomplete="off">
            <input type="password" id="a-pass" class="input-field" placeholder="Admin PIN" style="display:none;">
            <button type="submit" class="btn btn-accent w-full mt-2">JOIN LOBBY</button>
        </form>

        <a href="/games" id="games-back" class="back-link">Return to Games</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const isInvite = urlParams.get('invite') === 'true';
        if(isInvite) {
            document.getElementById('invite-notice').style.display = 'block';
            document.getElementById('games-back').style.display = 'none';
        }

        const ni = document.getElementById('a-name');
        const pi = document.getElementById('a-pass');
        ni.oninput = () => { pi.style.display = ni.value.toLowerCase().endsWith('admin') ? 'block' : 'none'; };

        document.getElementById('auction-login').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/api/auction/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: ni.value, password: pi.value })
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('auctionUser', JSON.stringify(data.user));
                location.href = '/auction/lobby';
            } else {
                alert(data.error);
            }
        };
    </script>
</body>
</html>
