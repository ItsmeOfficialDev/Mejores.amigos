<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arena Entry — Mejores Amigos</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: #0a0a0f; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; overflow: hidden; }
        .bg-gradient { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0a0a0f 100%); z-index: -1; }
        .login-card { width: 100%; max-width: 380px; background: rgba(18, 18, 28, 0.8); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 40px; padding: 48px 32px; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.5); }
        h1 { font-family: 'Syne'; font-size: 32px; margin-bottom: 8px; color: #fff; letter-spacing: -1px; }
        p { color: var(--text-dim); font-size: 14px; margin-bottom: 40px; font-weight: 500; }
        input { margin-bottom: 16px; }
        .back-link { margin-top: 24px; display: block; color: var(--text-dim); font-weight: 700; text-decoration: none; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .back-link:hover { color: #fff; }
        .invite-notice { background: rgba(245, 185, 66, 0.1); border: 1px solid rgba(245, 185, 66, 0.2); color: var(--accent); padding: 12px; border-radius: 16px; font-size: 12px; margin-bottom: 24px; font-weight: 700; display: none; }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="login-card animate-up">
        <div id="invite-notice" class="invite-notice">AUTHENTICATED INVITE: ENTER NAME</div>

        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQl5O38UyupxU5PU6W5jXASsMVPWHyg6ylDIg&s" class="logo-round" style="width:80px; height:80px; margin:0 auto 32px; display:block; border: 2px solid var(--border);">
        <h1>Auction Entry</h1>
        <p>Enter the elite bidding chamber</p>

        <form id="auction-login">
            <input type="text" id="a-name" class="input-field" placeholder="Full Name" required autocomplete="off">
            <input type="password" id="a-pass" class="input-field" placeholder="Admin Secret Key" style="display:none;">
            <button type="submit" class="btn btn-accent w-full mt-4">JOIN ARENA</button>
        </form>

        <a href="/games" id="games-back" class="back-link">Return to Games</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const isInvite = urlParams.get('invite') === 'true';
        if(isInvite) {
            document.getElementById('invite-notice').style.display = 'block';
            document.getElementById('games-back').style.display = 'none';
        }

        const ni = document.getElementById('a-name');
        const pi = document.getElementById('a-pass');
        ni.oninput = () => { pi.style.display = ni.value.toLowerCase().endsWith('admin') ? 'block' : 'none'; };

        document.getElementById('auction-login').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/api/auction/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: ni.value, password: pi.value })
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('auctionUser', JSON.stringify(data.user));
                location.href = '/auction/lobby';
            } else {
                alert(data.error);
            }
        };
    </script>
</body>
</html>
