<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mejores Amigos | Auction Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { min-height: 100vh; background: linear-gradient(135deg, #0b1120 0%, #1a2c3e 100%); color: #fff; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .box { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 215, 0, 0.2); padding: 40px; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .logo-circle { width: 70px; height: 70px; background: linear-gradient(135deg, #ffd700, #ffa500); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 900; color: #0b1120; margin: 0 auto 30px; font-family: 'Syne'; }
        h1 { font-family: 'Syne'; font-size: 2rem; margin-bottom: 30px; background: linear-gradient(135deg, #fff, #ffd700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input { width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 215, 0, 0.3); padding: 16px; border-radius: 15px; color: white; margin-bottom: 20px; outline: none; transition: 0.3s; }
        input:focus { border-color: #ffd700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }
        .btn { width: 100%; background: linear-gradient(135deg, #ffd700, #ffa500); color: #0b1120; border: none; padding: 18px; border-radius: 15px; font-family: 'Syne'; font-weight: 800; cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3); }
        #error { color: #f87171; font-size: 13px; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo-circle">MA</div>
        <h1>Auction Entry</h1>
        <form id="form">
            <input type="text" id="name" placeholder="Enter your name" required autocomplete="off">
            <input type="password" id="pass" placeholder="Auction Password" style="display:none;">
            <button type="submit" class="btn">JOIN WAITING ROOM</button>
            <div id="error"></div>
        </form>
    </div>
    <script>
        const ni = document.getElementById('name');
        const pi = document.getElementById('pass');
        const err = document.getElementById('error');
        ni.oninput = () => { pi.style.display = ni.value.toLowerCase().endsWith('admin') ? 'block' : 'none'; };
        document.getElementById('form').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: ni.value, password: pi.value })
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('mejoresAmigosUser', JSON.stringify(data.user));
                location.href = '/auction/lobby';
            } else {
                err.textContent = data.error; err.style.display = 'block';
            }
        };
    </script>
</body>
</html>
