<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Help — Mejores Amigos</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Inter:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FFFFFF; --primary: #111111; --surface: #F9F9FB; --border: #EEEEEE; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--primary); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 400px; background: #fff; border: 1px solid var(--border); border-radius: 32px; padding: 48px 32px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.04); }
        h1 { font-family: 'Syne'; font-size: 32px; margin-bottom: 16px; }
        p { color: #666; font-weight: 500; line-height: 1.6; margin-bottom: 24px; text-align: left; }
        a { color: var(--primary); font-weight: 700; text-decoration: none; border-bottom: 2px solid #F5B942; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Guide</h1>
        <p>• <b>Auction</b>: 15 Cr budget, 10s timer, GK(3), DEF(5), MID(5), FWD(5).<br>• <b>Reserve</b>: Always keep 10L per empty slot.<br>• <b>Games</b>: Play Chess or Tic-Tac-Toe with friends.</p>
        <a href="/hub.html">Back to Hub</a>
    </div>
</body>
</html>
